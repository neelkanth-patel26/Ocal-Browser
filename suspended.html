<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:;">
    <title>Tab Suspended | Ocal Browser</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0c;
            --border: #252525;
            --accent: #09f0a0;
            --accent-glow: rgba(9, 240, 160, 0.2);
            --accent-dim: rgba(9, 240, 160, 0.12);
            --card-bg: #111111;
            --card-border: #252525;
            --text-primary: #e8e8e8;
            --text-secondary: #666666;
            --font: 'Geist Mono', monospace;
        }

        body[data-theme="light"] {
            --bg: #ffffff;
            --border: #e2e8f0;
            --accent: #058f60;
            --accent-glow: rgba(5, 143, 96, 0.2);
            --accent-dim: rgba(5, 143, 96, 0.12);
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            user-select: none; -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: var(--font);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            cursor: pointer;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 440px;
            padding: 32px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: none !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .icon-container {
            position: relative;
            width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
            background: var(--accent-dim);
            color: var(--accent);
            border-radius: 50%;
            font-size: 32px;
        }

        .icon-container .ripple {
            position: absolute; inset: 0;
            border: 2px solid var(--accent);
            border-radius: 50%;
            opacity: 0.15;
            animation: ripple-anim 3s infinite ease-out;
        }
        @keyframes ripple-anim {
            from { transform: scale(1); opacity: 0.15; }
            to { transform: scale(1.6); opacity: 0; }
        }

        h1 {
            font-size: 24px; font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        p {
            font-size: 13px; color: var(--text-secondary);
            line-height: 1.6;
        }

        .site-pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 20px;
            background: var(--bg);
            border: 1px solid var(--card-border);
            font-size: 11px; font-weight: 600;
            color: var(--text-primary);
            max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .site-pill i { color: var(--accent); }

        .btn {
            width: 100%; padding: 12px 24px; border-radius: 24px;
            font-size: 13px; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            border: none;
            background: var(--accent);
            color: #000;
            font-family: var(--font);
        }

        .btn:hover {
            background: color-mix(in srgb, var(--accent) 80%, #000000);
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="icon-container">
            <i class="fas fa-moon"></i>
            <div class="ripple"></div>
        </div>
        
        <h1>Tab Suspended</h1>
        
        <p>This page was suspended by Ocal Memory Saver to free up CPU and system resources.</p>
        
        <div class="site-pill" id="site-pill">
            <i class="fas fa-globe"></i>
            <span id="site-url">Loading...</span>
        </div>
        
        <button class="btn" id="wake-btn">
            <i class="fas fa-bolt"></i> WAKE UP TAB
        </button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const originalUrl = urlParams.get('url') || '';

        try {
            if (originalUrl) {
                const domain = new URL(originalUrl).hostname;
                document.getElementById('site-url').innerText = domain;
            }
        } catch (e) {
            document.getElementById('site-url').innerText = originalUrl || 'Webpage';
        }

        function restore() {
            if (originalUrl) {
                window.location.replace(originalUrl);
            }
        }

        // Trigger restore on button click
        document.getElementById('wake-btn').onclick = (e) => {
            e.stopPropagation();
            restore();
        };

        // Trigger restore on general screen click
        document.body.onclick = () => restore();
    </script>
</body>
</html>
