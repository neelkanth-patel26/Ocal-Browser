<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('assets/fonts/geist-fonts.css');

        :root {
            --accent: #09f0a0;
            --accent-glow: rgba(9, 240, 160, 0.2);
            --accent-dim: rgba(9, 240, 160, 0.12);
            --bg-glass: #1a1a1e;
            --glass: #1a1a1e;
            --glass-border: #2d2d30;
            --text-main: #e8e8e8;
            --text-dim: #9ca3af;
            --radius: 12px;
        }

        body {
            margin: 0; padding: 10px; /* Padding to fit drop shadows */
            font-family: 'Geist Sans', sans-serif;
            background: transparent;
            overflow: hidden;
            display: flex;
            user-select: none;
        }

        .custom-context-menu {
            background: var(--bg-glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 6px;
            min-width: 200px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            animation: menu-entry 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @keyframes menu-entry { from { opacity:0; transform:translateY(-8px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }

        .menu-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .menu-option:hover { 
            background: var(--accent-dim); 
            color: var(--accent); 
        }
        .menu-option i { width: 16px; text-align: center; font-size: 14px; opacity: 0.8; transition: all 0.2s; color: var(--text-dim); }
        .menu-option:hover i:not([style*="color"]) { color: var(--accent); }
        .menu-option:hover i { transform: scale(1.1); opacity: 1; }
        
        .menu-option i.fa-circle {
            font-size: 10px;
            margin-right: 4px;
            filter: drop-shadow(0 0 2px var(--accent-glow));
        }

        .menu-separator {
            height: 1px;
            background: var(--glass-border);
            margin: 6px 8px;
        }

        .menu-sub {
            display: none;
            position: absolute;
            left: calc(100% - 4px);
            top: -6px;
            background: var(--bg-glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 6px;
            min-width: 160px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            animation: menu-entry 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .menu-sub::before {
            content: '';
            position: absolute;
            top: 0; left: -10px;
            width: 15px; height: 100%;
            background: rgba(255,255,255,0.001);
        }
        .menu-option:hover > .menu-sub { display: flex; flex-direction: column; }

    </style>
</head>
<body>
    <div id="menu-container" class="custom-context-menu"></div>
    <script>
        async function applyTheme() {
            try {
                const s = await window.electronAPI.invoke('get-settings');
                if (s.accentColor) {
                    const accent = s.accentColor;
                    document.documentElement.style.setProperty('--accent', accent);
                    const r = parseInt(accent.slice(1,3), 16), g = parseInt(accent.slice(3,5), 16), b = parseInt(accent.slice(5,7), 16);
                    document.documentElement.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.2)`);
                    document.documentElement.style.setProperty('--accent-dim', `rgba(${r}, ${g}, ${b}, 0.12)`);
                }
                if (s.themeMode === 'light') {
                     document.documentElement.style.setProperty('--bg-glass', '#ffffff');
                     document.documentElement.style.setProperty('--glass-border', '#e2e8f0');
                     document.documentElement.style.setProperty('--text-main', '#0f172a');
                     document.documentElement.style.setProperty('--text-dim', '#475569');
                } else {
                     document.documentElement.style.setProperty('--bg-glass', '#1a1a1e');
                     document.documentElement.style.setProperty('--glass-border', '#2d2d30');
                     document.documentElement.style.setProperty('--text-main', '#e8e8e8');
                     document.documentElement.style.setProperty('--text-dim', '#9ca3af');
                }
            } catch(e) {}
        }
        applyTheme();
        window.electronAPI.on('settings-changed', (s) => {
            if (s.accentColor) {
                const accent = s.accentColor;
                document.documentElement.style.setProperty('--accent', accent);
                const r = parseInt(accent.slice(1,3), 16), g = parseInt(accent.slice(3,5), 16), b = parseInt(accent.slice(5,7), 16);
                document.documentElement.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.2)`);
                document.documentElement.style.setProperty('--accent-dim', `rgba(${r}, ${g}, ${b}, 0.12)`);
            }
            if (s.themeMode === 'light') {
                document.documentElement.style.setProperty('--bg-glass', '#ffffff');
                document.documentElement.style.setProperty('--glass-border', '#e2e8f0');
                document.documentElement.style.setProperty('--text-main', '#0f172a');
                document.documentElement.style.setProperty('--text-dim', '#475569');
            } else {
                document.documentElement.style.setProperty('--bg-glass', '#1a1a1e');
                document.documentElement.style.setProperty('--glass-border', '#2d2d30');
                document.documentElement.style.setProperty('--text-main', '#e8e8e8');
                document.documentElement.style.setProperty('--text-dim', '#9ca3af');
            }
        });
    </script>
    <script src="tab-context.js"></script>
</body>
</html>
