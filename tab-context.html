<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('assets/fonts/geist-fonts.css');

        :root {
            --accent: #09f0a0;
            --accent-glow: rgba(9, 240, 160, 0.2);
            --accent-dim: rgba(9, 240, 160, 0.12);
            --bg-glass: #0c0c0c;
            --glass: #0c0c0c;
            --glass-border: #252525;
            --text-main: #e8e8e8;
            --text-dim: #666666;
            --radius: 12px;
        }

        body {
            margin: 0; padding: 10px; /* Padding to fit drop shadows */
            font-family: 'Geist Sans', sans-serif;
            background: transparent;
            overflow: hidden;
            display: flex;
            user-select: none;
        }

        .custom-context-menu {
            background: var(--bg-glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 4px;
            min-width: 170px;
            box-shadow: none !important;
            animation: menu-entry 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @keyframes menu-entry { from { opacity:0; transform:translateY(-8px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }

        .menu-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .menu-option:hover { 
            background: var(--accent-dim); 
            color: var(--accent); 
        }
        .menu-option i { width: 16px; text-align: center; font-size: 13px; opacity: 0.8; transition: all 0.2s; color: var(--text-dim); }
        .menu-option:hover i:not([style*="color"]) { color: var(--accent); }
        .menu-option:hover i { transform: none; opacity: 1; }
        
        .menu-option i.fa-circle {
            font-size: 9px;
            margin-right: 4px;
            filter: none;
        }

        .menu-separator {
            height: 1px;
            background: var(--glass-border);
            margin: 4px 6px;
        }

        .menu-sub {
            display: none;
            position: absolute;
            left: calc(100% - 4px);
            top: -6px;
            background: var(--bg-glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 4px;
            min-width: 140px;
            box-shadow: none !important;
            animation: menu-entry 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .menu-sub::before {
            content: '';
            position: absolute;
            top: 0; left: -10px;
            width: 15px; height: 100%;
            background: rgba(255,255,255,0.001);
        }
        .menu-option:hover > .menu-sub { display: flex; flex-direction: column; }

        /* Emoji Grid styles */
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            padding: 4px;
        }
        .emoji-grid-item {
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .emoji-grid-item:hover {
            background: var(--accent-dim);
            transform: scale(1.2);
        }

        body[data-theme="light"] .custom-context-menu,
        body[data-theme="light"] .menu-sub {
            box-shadow: none !important;
        }

    </style>
</head>
<body>
    <div id="menu-container" class="custom-context-menu"></div>
    <script>
        function getModeAccent(color, isLight) {
            if (!color) return isLight ? '#058f60' : '#09f0a0';
            if (!isLight) return color;
            const hex = color.toLowerCase();
            if (hex === '#09f0a0' || hex === '#00ffaa' || hex.includes('f0a0')) return '#058f60';
            if (hex === '#ff007f' || hex === '#ff00aa' || hex.includes('ff007') || hex.includes('ff00a')) return '#d81b60';
            if (hex === '#00e5ff' || hex === '#00ffff' || hex.includes('00e5') || hex.includes('00f0')) return '#0288d1';
            if (hex === '#ff9100' || hex === '#ffaa00' || hex.includes('ff91') || hex.includes('ffaa')) return '#d97706';
            if (hex === '#8b5cf6' || hex === '#a855f7' || hex === '#9333ea' || hex.includes('8b5c') || hex.includes('a855')) return '#6d28d9';
            if (hex === '#ff4d4d' || hex === '#ff3333' || hex.includes('ff4d') || hex.includes('ff33')) return '#dc2626';
            if (hex === '#ffffff' || hex === '#f4f4f5' || hex === '#e8e8e8' || hex.includes('fff')) return '#0f172a';
            return color;
        }

        async function applyTheme() {
            try {
                const s = await window.electronAPI.invoke('get-settings');
                const isLight = s.themeMode === 'light';
                if (s.themeMode && s.themeMode !== 'light') {
                    document.body.setAttribute('data-theme', s.themeMode);
                } else {
                    document.body.setAttribute('data-theme', 'light');
                }
                if (s.accentColor) {
                    const accent = getModeAccent(s.accentColor, isLight);
                    document.documentElement.style.setProperty('--accent', accent);
                    const r = parseInt(accent.slice(1,3), 16), g = parseInt(accent.slice(3,5), 16), b = parseInt(accent.slice(5,7), 16);
                    document.documentElement.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.2)`);
                    document.documentElement.style.setProperty('--accent-dim', `rgba(${r}, ${g}, ${b}, 0.12)`);
                }
                if (s.themeMode === 'light') {
                     document.documentElement.style.setProperty('--bg-glass', '#ffffff');
                     document.documentElement.style.setProperty('--glass-border', '#e2e8f0');
                     document.documentElement.style.setProperty('--text-main', '#0f172a');
                     document.documentElement.style.setProperty('--text-dim', '#475569');
                } else {
                     document.documentElement.style.setProperty('--bg-glass', '#0c0c0c');
                     document.documentElement.style.setProperty('--glass-border', '#252525');
                     document.documentElement.style.setProperty('--text-main', '#e8e8e8');
                     document.documentElement.style.setProperty('--text-dim', '#666666');
                }
            } catch(e) {}
        }
        applyTheme();
        window.electronAPI.on('settings-changed', (s) => {
            const isLight = s.themeMode === 'light';
            if (s.themeMode && s.themeMode !== 'light') {
                document.body.setAttribute('data-theme', s.themeMode);
            } else {
                document.body.setAttribute('data-theme', 'light');
            }
            if (s.accentColor) {
                const accent = getModeAccent(s.accentColor, isLight);
                document.documentElement.style.setProperty('--accent', accent);
                const r = parseInt(accent.slice(1,3), 16), g = parseInt(accent.slice(3,5), 16), b = parseInt(accent.slice(5,7), 16);
                document.documentElement.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.2)`);
                document.documentElement.style.setProperty('--accent-dim', `rgba(${r}, ${g}, ${b}, 0.12)`);
            }
            if (s.themeMode === 'light') {
                document.documentElement.style.setProperty('--bg-glass', '#ffffff');
                document.documentElement.style.setProperty('--glass-border', '#e2e8f0');
                document.documentElement.style.setProperty('--text-main', '#0f172a');
                document.documentElement.style.setProperty('--text-dim', '#475569');
            } else {
                document.documentElement.style.setProperty('--bg-glass', '#0c0c0c');
                document.documentElement.style.setProperty('--glass-border', '#252525');
                document.documentElement.style.setProperty('--text-main', '#e8e8e8');
                document.documentElement.style.setProperty('--text-dim', '#666666');
            }
        });
    </script>
    <script src="tab-context.js"></script>
</body>
</html>
