<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connecting...</title>
    <!-- Outfit and Inter Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for high quality brand icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --background: #09090b; /* Premium deep zinc background */
            --foreground: #f4f4f5; /* Clean zinc off-white text */
            --accent: #09f0a0;     /* Default neon green fallback */
            --text-dim: #71717a;   /* Muted zinc grey description */
            --font-title: 'Outfit', 'Inter', -apple-system, sans-serif;
            --font-main: 'Inter', -apple-system, sans-serif;
        }
        
        body {
            background-color: var(--background);
            background-image: radial-gradient(circle at center, rgba(255, 255, 255, 0.02) 0%, transparent 65%);
            color: var(--foreground);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-align: center;
            opacity: 0;
            transform: translateY(8px);
            animation: container-enter 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        /* Loading Rings and Logo Box */
        .loader-wrapper {
            position: relative;
            width: 76px;
            height: 76px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .spinner-outer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.03);
            border-top: 2px solid var(--app-accent, var(--accent));
            border-radius: 50%;
            animation: spin 1.1s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
        }
        
        .spinner-inner {
            position: absolute;
            top: 6px;
            left: 6px;
            width: calc(100% - 12px);
            height: calc(100% - 12px);
            border: 1.5px solid transparent;
            border-bottom: 1.5px solid var(--app-accent, var(--accent));
            opacity: 0.35;
            border-radius: 50%;
            animation: spin-reverse 1.6s linear infinite;
        }
        
        .logo-box {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--app-accent, var(--accent));
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            z-index: 2;
            transition: color 0.3s ease;
        }
        
        /* Info Typography */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .app-name {
            font-family: var(--font-title);
            font-size: 15px;
            font-weight: 600;
            color: var(--foreground);
            letter-spacing: -0.2px;
        }
        
        .status-msg {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-dim);
            letter-spacing: 0.1px;
        }
        
        /* Keyframes */
        @keyframes container-enter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes spin-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader-wrapper">
            <div class="spinner-outer"></div>
            <div class="spinner-inner"></div>
            <div class="logo-box">
                <i id="app-icon" class="fas fa-globe"></i>
            </div>
        </div>
        <div class="info-panel">
            <div class="app-name" id="app-name">Web Application</div>
            <div class="status-msg" id="status-msg">Connecting securely...</div>
        </div>
    </div>
    
    <script>
        const params = new URLSearchParams(window.location.search);
        const urlParam = params.get('url') || '';
        let appName = 'Web Application';
        let iconClass = 'fas fa-globe';
        let accentColor = '#09f0a0'; // standard default accent
        
        if (urlParam.includes('whatsapp.com')) {
            appName = 'WhatsApp';
            iconClass = 'fab fa-whatsapp';
            accentColor = '#25D366';
        } else if (urlParam.includes('instagram.com')) {
            appName = 'Instagram';
            iconClass = 'fab fa-instagram';
            accentColor = '#E1306C';
        } else if (urlParam.includes('x.com') || urlParam.includes('twitter.com')) {
            appName = 'Twitter/X';
            iconClass = 'fab fa-x-twitter';
            accentColor = '#ffffff';
        } else if (urlParam.includes('discord.com')) {
            appName = 'Discord';
            iconClass = 'fab fa-discord';
            accentColor = '#5865F2';
        } else if (urlParam.includes('spotify.com')) {
            appName = 'Spotify';
            iconClass = 'fab fa-spotify';
            accentColor = '#1DB954';
        }
        
        // Dynamically update the app icon, name, and subtitle
        document.getElementById('app-icon').className = iconClass;
        document.getElementById('app-name').innerText = appName;
        document.getElementById('status-msg').innerText = `Preparing secure connection...`;
        
        // Apply dynamic accent color to custom properties
        document.documentElement.style.setProperty('--app-accent', accentColor);
    </script>
</body>
</html>
