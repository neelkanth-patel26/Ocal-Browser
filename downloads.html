<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads Popup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <style>
        :root {
            --panel-bg: #0c0c0c;
            --radius: 12px;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            overflow: hidden;
            font-family: 'Geist Mono', monospace;
            color: var(--text);
            border-radius: var(--radius);
        }
        
        .backdrop {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.01); /* Invisible overlay to catch clicks */
            z-index: 1;
        }

        .popup-panel {
            position: absolute;
            z-index: 2;
            background: var(--panel-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            width: 350px;
            height: 450px;
            overflow: hidden;
        }

        .header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
        }

        .header-title {
            font-weight: 600;
            font-size: 14px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }
        
        .header-title i {
            color: var(--accent);
            background: #171717;
            padding: 6px;
            font-size: 12px;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .list-container::-webkit-scrollbar {
            width: 4px;
        }
        .list-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            transition: all 0.2s;
        }
        .list-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 140px;
            color: var(--text-dim);
            font-size: 13px;
            gap: 14px;
            font-weight: 500;
        }
        
        .empty-state i {
            font-size: 32px;
            opacity: 0.3;
            color: var(--text);
            transition: all 0.5s;
        }
        .empty-state:hover i {
            transform: translateY(-5px);
            opacity: 0.7;
            color: var(--accent);
        }

        .dl-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: all 0.2s;
            transform: translateX(10px);
        }
        .dl-item:hover .dl-actions {
            opacity: 1;
            transform: translateX(0);
        }
        .dl-action-btn {
            background: #0a0a0a;
            border: 1px solid #171717;
            color: #fff;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .dl-action-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(168,85,247,0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="backdrop" id="backdrop"></div>
    <div class="popup-panel" id="popup-panel">
        <div class="header">
            <div class="header-title">
                <i class="fas fa-arrow-down"></i> Recent Downloads
            </div>
            <button id="open-sidebar-btn" class="dl-action-btn" title="Open Full Downloads Manager">
                <i class="fas fa-external-link-alt"></i>
            </button>
        </div>
        <div class="list-container" id="dl-list">
            <div class="empty-state">
                <i class="fas fa-ghost"></i> No recent downloads
            </div>
        </div>
    </div>

    <script src="downloads.js"></script>
</body>
</html>
