<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads Popup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <style>
        :root {
            --panel-bg: #1a1a1e;
            --border: #2d2d30;
            --accent: #09f0a0;
            --accent-glow: rgba(9, 240, 160, 0.2);
            --accent-dim: rgba(9, 240, 160, 0.12);
            --card-bg: #1a1a1e;
            --card-border: #2d2d30;
            --card-hover-bg: #28282d;
            --card-hover-border: var(--accent);
            --text: #e8e8e8;
            --text-dim: #9ca3af;
            --radius: 12px;
        }

        /* ── Light Theme (Flashbang Mode) ─────────────────────────── */
        body[data-theme="light"] {
            --panel-bg: #ffffff;
            --border: #e2e8f0;
            --accent: #058f60;
            --accent-glow: rgba(5, 143, 96, 0.2);
            --accent-dim: rgba(5, 143, 96, 0.12);
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --card-hover-bg: #f1f5f9;
            --card-hover-border: var(--accent);
            --text: #0f172a;
            --text-dim: #475569;
        }

        * { box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            overflow: hidden;
            font-family: 'Geist Mono', monospace;
            color: var(--text);
            border-radius: var(--radius);
        }
        
        .backdrop {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.01); /* Invisible overlay to catch clicks */
            z-index: 1;
        }

        .popup-panel {
            position: absolute;
            z-index: 2;
            background: var(--panel-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            width: 350px;
            height: 450px;
            overflow: hidden;
        }

        /* Top-light highlight to match topbar */
        .popup-panel::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 15%);
            pointer-events: none;
            border-radius: inherit;
            z-index: 3;
        }

        body[data-theme="light"] .popup-panel::before {
            background: linear-gradient(180deg, rgba(0,0,0,0.02) 0%, transparent 15%);
        }

        .header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--panel-bg);
            position: relative;
            z-index: 4;
        }

        .header-title {
            font-weight: 700;
            font-size: 14px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }
        
        .header-title i {
            color: var(--accent);
            background: var(--card-border);
            padding: 6px;
            font-size: 12px;
            border-radius: 6px;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            z-index: 4;
        }

        .list-container::-webkit-scrollbar {
            width: 4px;
        }
        .list-container::-webkit-scrollbar-thumb {
            background: var(--card-border);
            border-radius: 2px;
            transition: all 0.2s;
        }
        .list-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 140px;
            color: var(--text-dim);
            font-size: 13px;
            gap: 14px;
            font-weight: 500;
        }
        
        .empty-state i {
            font-size: 32px;
            opacity: 0.3;
            color: var(--text);
            transition: all 0.5s;
        }
        .empty-state:hover i {
            transform: translateY(-5px);
            opacity: 0.7;
            color: var(--accent);
        }

        /* ── Download Items override to use solid theme variables ── */
        .dl-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            background: var(--card-bg) !important;
            border: 1px solid var(--card-border) !important;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: none !important;
        }
        .dl-item:hover {
            background: var(--card-hover-bg) !important;
            border-color: var(--card-hover-border) !important;
            transform: none !important;
            box-shadow: none !important;
        }
        .dl-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-border) !important;
            color: var(--accent) !important;
            border-radius: 8px;
            font-size: 16px;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .dl-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .dl-name {
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
        }
        .dl-status {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .dl-bar-bg {
            width: 100%;
            height: 4px;
            background: var(--card-border);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px;
        }
        .dl-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .dl-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: all 0.2s;
            transform: translateX(10px);
        }
        .dl-item:hover .dl-actions {
            opacity: 1;
            transform: translateX(0);
        }
        .dl-action-btn {
            background: var(--card-bg) !important;
            border: 1px solid var(--card-border) !important;
            color: var(--text) !important;
            width: 30px;
            height: 30px;
            border-radius: 50% !important;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: 0.2s;
        }
        .dl-action-btn:hover {
            background: var(--card-hover-bg) !important;
            border-color: var(--accent) !important;
            color: var(--accent) !important;
            box-shadow: none !important;
            transform: scale(1.08) !important;
        }
    </style>
</head>
<body>
    <div class="backdrop" id="backdrop"></div>
    <div class="popup-panel" id="popup-panel">
        <div class="header">
            <div class="header-title">
                <i class="fas fa-arrow-down"></i> Recent Downloads
            </div>
            <button id="open-sidebar-btn" class="dl-action-btn" title="Open Full Downloads Manager">
                <i class="fas fa-external-link-alt"></i>
            </button>
        </div>
        <div class="list-container" id="dl-list">
            <div class="empty-state">
                <i class="fas fa-ghost"></i> No recent downloads
            </div>
        </div>
    </div>

    <script src="downloads.js"></script>
</body>
</html>
