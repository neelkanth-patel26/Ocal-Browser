<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
    <title>Ocal Grid | Synthwave Tetris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        .ambient-bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, #0b1a2e 0%, #050508 100%);
            z-index: -1;
        }

        .game-layout {
            display: flex;
            gap: 40px;
            padding: 40px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            backdrop-filter: blur(30px);
            box-shadow: 0 50px 150px rgba(0,0,0,0.8);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* Left Panel: Stats */
        .side-panel {
            width: 180px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stat-box {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        .stat-label {
            font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.3);
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 32px; font-weight: 800; color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        /* Center: Grid */
        .grid-container {
            position: relative;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* Right Panel: Preview & Instructions */
        .preview-box {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            width: 140px;
            height: 140px;
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
        }

        .controls-hint {
            margin-top: auto;
            font-size: 11px; color: rgba(255,255,255,0.3);
            line-height: 1.8;
        }
        .key {
            display: inline-block; padding: 2px 6px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px; color: #fff; margin: 0 2px;
        }

        /* Overlays */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            border-radius: 12px;
            z-index: 100;
        }
        .overlay.active { display: flex; }

        h2 { font-family: 'Outfit', sans-serif; font-size: 32px; margin-bottom: 24px; }
        .btn {
            background: var(--accent); color: #000; border: none;
            padding: 14px 32px; border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 800;
            cursor: pointer; transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px var(--accent-glow); }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>

    <div class="game-layout">
        <div class="side-panel">
            <div>
                <div class="stat-box">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Lines</div>
                    <div class="stat-value" id="lines">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="level">1</div>
                </div>
            </div>
            
            <div class="controls-hint">
                <span class="key">←</span> <span class="key">→</span> Move<br>
                <span class="key">↑</span> Rotate<br>
                <span class="key">↓</span> Soft Drop<br>
                <span class="key">SPACE</span> Hard Drop
            </div>
        </div>

        <div class="grid-container">
            <canvas id="gameCanvas"></canvas>
            
            <div class="overlay active" id="startOverlay">
                <h2>OCAL GRID</h2>
                <button class="btn" id="startBtn">START SYSTEM</button>
            </div>

            <div class="overlay" id="gameOverOverlay">
                <h2 style="color: #ff3366;">GRID HALTED</h2>
                <div style="font-size: 20px; opacity: 0.6; margin-bottom: 32px;">Top Score: <span id="finalScore">0</span></div>
                <button class="btn" id="restartBtn">REBOOT</button>
            </div>
        </div>

        <div class="side-panel" style="width: 140px;">
            <div class="stat-label" style="text-align: center; margin-bottom: 12px;">Next Core</div>
            <div class="preview-box">
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>
            
            <div style="margin-top: 40px; text-align: center;">
                <a href="games.html" style="color: var(--accent); text-decoration: none; font-size: 12px; font-weight: 800; letter-spacing: 1px; opacity: 0.6;">BACK TO HUB</a>
            </div>
        </div>
    </div>

    <script src="tetris.js"></script>
</body>
</html>
