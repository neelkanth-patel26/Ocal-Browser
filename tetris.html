<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
    <title>Ocal Grid | Glass Tetris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        @import url('https://cdn.jsdelivr.net/fontsource/fonts/geist-sans@latest/latin-400-normal.css');
        @import url('https://cdn.jsdelivr.net/fontsource/fonts/geist-sans@latest/latin-700-normal.css');
        @import url('https://cdn.jsdelivr.net/fontsource/fonts/geist-mono@latest/latin-400-normal.css');
    </style>
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.25);
            --accent-dim: rgba(0, 242, 255, 0.15);
            --accent-border: rgba(0, 242, 255, 0.35);
            --bg: #09090b;
            --glass: #18181b;
            --glass-border: #27272a;
            --radius: 12px;
            --text-main: #f4f4f5;
            --text-muted: #71717a;
            --text-dim: #a1a1aa;
            --font-title: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-main: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Geist Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        .game-layout {
            display: flex;
            gap: 24px;
            padding: 24px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        /* Left Panel: Stats */
        .side-panel {
            width: 160px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: var(--font-title);
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* Center: Grid */
        .grid-container {
            position: relative;
            background: #050507;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
        }

        /* Right Panel: Preview & Instructions */
        .preview-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            width: 120px;
            height: 120px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .controls-hint {
            margin-top: auto;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.8;
        }

        .key {
            display: inline-block;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            color: #fff;
            margin: 0 2px;
            font-family: var(--font-mono);
        }

        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 8px;
        }

        .overlay.active {
            display: flex;
        }

        h2 {
            font-family: var(--font-title);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px var(--accent-glow);
            filter: brightness(1.1);
        }

        .exit-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            opacity: 0.8;
            transition: color 0.15s ease;
        }

        .exit-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="game-layout">
        <div class="side-panel">
            <div>
                <div class="stat-box">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Lines</div>
                    <div class="stat-value" id="lines">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="level">1</div>
                </div>
            </div>
            
            <div class="controls-hint">
                <span class="key">←</span> <span class="key">→</span> Move<br>
                <span class="key">↑</span> Rotate<br>
                <span class="key">↓</span> Soft Drop<br>
                <span class="key">SPACE</span> Hard Drop
            </div>
        </div>

        <div class="grid-container">
            <canvas id="gameCanvas"></canvas>
            
            <div class="overlay active" id="startOverlay">
                <h2>OCAL GRID</h2>
                <button class="btn" id="startBtn">START SYSTEM</button>
            </div>

            <div class="overlay" id="gameOverOverlay">
                <h2 style="color: #ff3366;">GRID HALTED</h2>
                <div style="font-size: 18px; opacity: 0.7; margin-bottom: 20px;">Top Score: <span id="finalScore">0</span></div>
                <button class="btn" id="restartBtn">REBOOT</button>
            </div>
        </div>

        <div class="side-panel" style="width: 120px; align-items: center; justify-content: space-between;">
            <div style="width: 100%;">
                <div class="stat-label" style="text-align: center; margin-bottom: 8px;">Next Core</div>
                <div class="preview-box">
                    <canvas id="nextCanvas" width="100" height="100"></canvas>
                </div>
            </div>
            
            <div style="margin-bottom: 12px; text-align: center;">
                <a href="games.html" class="exit-link">EXIT TO HUB</a>
            </div>
        </div>
    </div>

    <script>
        // Apply dynamic accent color
        function applyAccent(color) {
            if (!color) return;
            document.documentElement.style.setProperty('--accent', color);
            
            const hexToRgba = (hex, alpha) => {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                if (!result) return `rgba(0, 242, 255, ${alpha})`;
                const r = parseInt(result[1], 16);
                const g = parseInt(result[2], 16);
                const b = parseInt(result[3], 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            };
            
            document.documentElement.style.setProperty('--accent-glow', hexToRgba(color, 0.25));
            document.documentElement.style.setProperty('--accent-dim', hexToRgba(color, 0.15));
            document.documentElement.style.setProperty('--accent-border', hexToRgba(color, 0.35));
        }

        if (window.electronAPI) {
            window.electronAPI.getSettings().then(s => {
                if (s.accentColor) applyAccent(s.accentColor);
            });
            window.electronAPI.onSettingsChanged((s) => {
                if (s.accentColor) applyAccent(s.accentColor);
            });
        }
    </script>
    <script src="tetris.js"></script>
</body>
</html>
