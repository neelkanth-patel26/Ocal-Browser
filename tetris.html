<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:;">
    <title>Ocal Grid | Glass Tetris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #e8ff47;
            --accent-glow: rgba(232, 255, 71, 0.25);
            --accent-dim: rgba(232, 255, 71, 0.12);
            --accent-border: rgba(232, 255, 71, 0.35);
            --bg: #0c0c0c;
            --radius: 2px;
            --text-main: #e8e8e8;
            --text-muted: #666666;
            --text-dim: #999999;
            --border-flat: #252525;
            --font-title: 'Syne', sans-serif;
            --font-main: 'DM Sans', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        .game-layout {
            display: flex;
            gap: 40px;
            padding: 0;
            background: transparent !important;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }

        /* Left Panel: Stats */
        .side-panel {
            width: 160px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stat-box {
            background: transparent !important;
            border: none !important;
            border-bottom: 1px solid var(--border-flat) !important;
            padding: 12px 0;
            border-radius: 0 !important;
            margin-bottom: 12px;
            text-align: left;
        }

        .stat-label {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: var(--font-title);
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        /* Center: Grid */
        .grid-container {
            position: relative;
            background: #000000;
            border: 1px solid var(--border-flat);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: none !important;
        }

        canvas {
            display: block;
        }

        /* Right Panel: Preview & Instructions */
        .preview-box {
            background: transparent !important;
            border: 1px solid var(--border-flat) !important;
            width: 120px;
            height: 120px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .controls-hint {
            margin-top: auto;
            font-size: 10px;
            color: var(--text-muted);
            line-height: 2;
        }

        .key {
            display: inline-block;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-flat);
            border-radius: 4px;
            color: #fff;
            margin: 0 2px;
            font-family: var(--font-mono);
        }

        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(12, 12, 12, 0.95);
            backdrop-filter: none !important;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: var(--radius);
        }

        .overlay.active {
            display: flex;
        }

        h2 {
            font-family: var(--font-title);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-family: var(--font-main);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .btn:hover {
            transform: scale(1.03);
            filter: brightness(1.15);
        }

        .exit-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: opacity 0.15s ease;
        }

        .exit-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="game-layout">
        <div class="side-panel">
            <div>
                <div class="stat-box">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Lines</div>
                    <div class="stat-value" id="lines">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="level">1</div>
                </div>
            </div>
            
            <div class="controls-hint">
                <span class="key">←</span> <span class="key">→</span> Move<br>
                <span class="key">↑</span> Rotate<br>
                <span class="key">↓</span> Soft Drop<br>
                <span class="key">SPACE</span> Hard Drop
            </div>
        </div>

        <div class="grid-container">
            <canvas id="gameCanvas"></canvas>
            
            <div class="overlay active" id="startOverlay">
                <h2>OCAL GRID</h2>
                <button class="btn" id="startBtn">START SYSTEM</button>
            </div>

            <div class="overlay" id="gameOverOverlay">
                <h2 style="color: #ff3366;">GRID HALTED</h2>
                <div style="font-size: 18px; opacity: 0.7; margin-bottom: 20px;">Top Score: <span id="finalScore">0</span></div>
                <button class="btn" id="restartBtn">REBOOT</button>
            </div>
        </div>

        <div class="side-panel" style="width: 120px; align-items: center; justify-content: space-between;">
            <div style="width: 100%;">
                <div class="stat-label" style="text-align: center; margin-bottom: 8px;">Next Core</div>
                <div class="preview-box">
                    <canvas id="nextCanvas" width="100" height="100"></canvas>
                </div>
            </div>
            
            <div style="margin-bottom: 12px; text-align: center;">
                <a href="games.html" class="exit-link">EXIT TO HUB</a>
            </div>
        </div>
    </div>

    <!-- Locked to local stylesheet design parameters to match D:\ocal style specifications -->
    <script src="tetris.js"></script>
</body>
</html>
