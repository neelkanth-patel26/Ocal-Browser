<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data: https:;">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/fonts/geist-fonts.css">
    <style>
        :root {
            --accent: #09f0a0;
            --accent-rgb: 9, 240, 160;
            --accent-dim: rgba(9, 240, 160, 0.10);
            --accent-glow: rgba(9, 240, 160, 0.25);
            --bg-glass: #0e0e10;
            --bg-surface: #161619;
            --border-glass: #232326;
            --border-hover: #2e2e32;
            --text-primary: #eaeaea;
            --text-secondary: #8a8a8e;
            --text-muted: #505054;
            --radius: 14px;
            --radius-sm: 10px;
            --shadow-dropdown: none;
        }

        /* ── Light Theme ─────────────────────────── */
        body[data-theme="light"] {
            --bg-glass: #ffffff;
            --bg-surface: #f5f5f7;
            --border-glass: rgba(0,0,0,0.08);
            --border-hover: rgba(0,0,0,0.12);
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6e;
            --text-muted: #999;
            --shadow-dropdown: none;
        }

        body[data-theme="light"] .dropdown-container {
            background: rgba(255,255,255,0.92) !important;
            backdrop-filter: blur(24px) !important;
            -webkit-backdrop-filter: blur(24px) !important;
        }

        body[data-theme="light"] .menu-option .favicon-wrap {
            background: rgba(0,0,0,0.04) !important;
            border-color: rgba(0,0,0,0.06) !important;
        }

        body[data-theme="light"] .menu-option:hover .favicon-wrap {
            background: rgba(var(--accent-rgb), 0.08) !important;
            border-color: rgba(var(--accent-rgb), 0.18) !important;
        }

        body[data-theme="light"] .dropdown-header {
            color: var(--text-secondary) !important;
            border-bottom-color: rgba(0,0,0,0.06) !important;
        }

        body[data-theme="light"] .empty-state i {
            color: rgba(0,0,0,0.15) !important;
        }

        /* ── Base ─────────────────────────── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            overflow: hidden !important;
        }

        body {
            margin: 0;
            padding: 0px 10px 10px 10px;
            font-family: 'Geist Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: transparent;
            overflow: hidden !important;
        }

        /* ── Dropdown Container ─────────────────────────── */
        .dropdown-container {
            width: fit-content;
            min-width: 240px;
            max-width: 340px;
            max-height: 480px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            padding: 6px;
            box-shadow: var(--shadow-dropdown);
            animation: containerIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerIn {
            from { opacity: 0; transform: translateY(-6px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Header ─────────────────────────── */
        .dropdown-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px 8px;
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-glass);
            margin-bottom: 4px;
            user-select: none;
        }

        .dropdown-header i {
            font-size: 10px;
            opacity: 0.7;
        }

        /* ── Menu Item ─────────────────────────── */
        .menu-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 450;
            letter-spacing: -0.01em;
            transition: all 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            animation: itemSlideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes itemSlideIn {
            from { opacity: 0; transform: translateX(-6px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .menu-option:hover {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .menu-option:active {
            transform: scale(0.98);
        }

        /* ── Favicon Badge ─────────────────────────── */
        .favicon-wrap {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: var(--bg-surface);
            border: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.18s ease;
            overflow: hidden;
        }

        .menu-option:hover .favicon-wrap {
            background: rgba(var(--accent-rgb), 0.08);
            border-color: rgba(var(--accent-rgb), 0.2);
            box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.1);
        }

        .favicon-wrap img {
            width: 16px;
            height: 16px;
            border-radius: 2px;
            object-fit: contain;
        }

        .favicon-wrap .favicon-fallback {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* ── Text Content ─────────────────────────── */
        .bm-text {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .bm-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            line-height: 1.3;
        }

        .bm-domain {
            font-size: 10.5px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            opacity: 0.7;
            transition: all 0.18s ease;
        }

        .menu-option:hover .bm-domain {
            color: var(--accent);
            opacity: 0.5;
        }

        /* ── Arrow Indicator ─────────────────────────── */
        .nav-arrow {
            font-size: 10px;
            color: var(--text-muted);
            opacity: 0;
            transform: translateX(-4px);
            transition: all 0.18s ease;
            flex-shrink: 0;
        }

        .menu-option:hover .nav-arrow {
            opacity: 1;
            transform: translateX(0);
            color: var(--accent);
        }

        /* ── Empty State ─────────────────────────── */
        .empty-state {
            padding: 28px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: itemSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .empty-state i {
            font-size: 28px;
            color: var(--text-muted);
            opacity: 0.4;
        }

        .empty-state .empty-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .empty-state .empty-subtitle {
            font-size: 11.5px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* ── Scrollbar ─────────────────────────── */
        .dropdown-container::-webkit-scrollbar {
            width: 5px !important;
            height: 5px !important;
        }
        .dropdown-container::-webkit-scrollbar-track {
            background: transparent !important;
        }
        .dropdown-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12) !important;
            border-radius: 10px !important;
        }
        .dropdown-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2) !important;
        }
        body[data-theme="light"] .dropdown-container::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.12) !important;
        }
        body[data-theme="light"] .dropdown-container::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.2) !important;
        }
    </style>
</head>
<body>
    <div class="dropdown-container" id="menu-container"></div>
    <script src="bm-dropdown.js"></script>
</body>
</html>
