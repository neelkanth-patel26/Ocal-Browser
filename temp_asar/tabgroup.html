<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com;">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <style>
        :root {
            --panel-bg: #111111;
            --border: #252525;
            --accent: #09f0a0;
            --accent-dim: rgba(9, 240, 160, 0.12);
            --text: #e8e8e8;
            --text-dim: #666666;
            --card-bg: #111111;
            --card-border: #252525;
            --card-hover-bg: #1e1e1e;
            --radius: 12px;
        }

        /* ── Light Theme (Flashbang Mode) ─────────────────────────── */
        body[data-theme="light"] {
            --panel-bg: #ffffff;
            --border: #e2e8f0;
            --accent: #058f60;
            --accent-dim: rgba(5, 143, 96, 0.12);
            --text: #0f172a;
            --text-dim: #475569;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --card-hover-bg: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        html, body {
            background: transparent;
            width: 100vw; height: 100vh;
            overflow: hidden; pointer-events: none;
            font-family: 'Geist Mono', monospace;
            color: var(--text);
        }
        
        .backdrop {
            position: absolute; inset: 0; pointer-events: auto; background: rgba(0,0,0,0.01); z-index: 1;
        }
        
        .popup-panel {
            position: absolute; z-index: 2; pointer-events: auto;
            background: var(--panel-bg);
            padding: 20px; border-radius: var(--radius); border: 1px solid var(--border);
            width: 260px;
            display: none; /* Hide by default to prevent positioning flicker */
            flex-direction: column; gap: 4px;
            box-shadow: none !important;
        }

        .popup-panel::before {
            display: none !important;
        }

        body[data-theme="light"] .popup-panel {
            box-shadow: none !important;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            position: relative;
            z-index: 4;
        }
        
        .icon-circle {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            color: #000;
            font-size: 16px;
            border-radius: 8px;
            box-shadow: none;
            transition: background 0.3s, color 0.3s;
        }

        .input-container {
            flex: 1;
            position: relative;
        }
        
        input {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 8px;
            outline: none;
            width: 100%;
            font-size: 13.5px;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        input:focus { 
            border-color: var(--accent); 
            background: var(--card-hover-bg);
            box-shadow: none;
        }
        
        .section-label {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            position: relative;
            z-index: 4;
        }

        .color-grid {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 0 2px;
            position: relative;
            z-index: 4;
        }
        
        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        
        .color-dot:hover { transform: none; }
        
        .color-dot.active { 
            border-color: var(--text); 
            transform: none;
            box-shadow: none;
        }

        .actions {
            display: flex;
            gap: 10px;
            position: relative;
            z-index: 4;
        }
        
        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid transparent;
        }
        
        .btn-secondary { 
            background: var(--card-bg); 
            color: var(--text);
            border-color: var(--border);
        }
        
        .btn-secondary:hover { 
            background: var(--card-hover-bg); 
            color: var(--accent); 
            border-color: var(--accent);
            transform: none;
        }
        
        .btn-danger { 
            background: rgba(239, 68, 68, 0.1); 
            color: #ef4444; 
            border-color: rgba(239, 68, 68, 0.2);
        }
        
        .btn-danger:hover { 
            background: rgba(239, 68, 68, 0.2); 
            border-color: #ef4444;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="backdrop" id="backdrop"></div>
    <div class="popup-panel" id="popup-panel">
        <div class="header">
            <div class="icon-circle" id="group-icon"><i class="fas fa-layer-group"></i></div>
            <div class="input-container">
                <input type="text" id="group-name" placeholder="Group Name">
            </div>
        </div>

        <span class="section-label">Group Color</span>
        <div class="color-grid" id="color-grid">
            <div class="color-dot" data-color="#ef4444" style="background: #ef4444; color: #ef4444"></div>
            <div class="color-dot" data-color="#3b82f6" style="background: #3b82f6; color: #3b82f6"></div>
            <div class="color-dot" data-color="#10b981" style="background: #10b981; color: #10b981"></div>
            <div class="color-dot" data-color="#f59e0b" style="background: #f59e0b; color: #f59e0b"></div>
            <div class="color-dot" data-color="#a855f7" style="background: #a855f7; color: #a855f7"></div>
            <div class="color-dot" data-color="#6366f1" style="background: #6366f1; color: #6366f1"></div>
        </div>

        <div class="actions">
            <div class="btn btn-secondary" id="ungroup-btn">
                <i class="fas fa-object-ungroup"></i> Ungroup
            </div>
            <div class="btn btn-danger" id="close-btn">
                <i class="fas fa-times"></i> Close
            </div>
        </div>
    </div>

    <script src="tabgroup.js"></script>
</body>
</html>
