<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com;">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <style>
        :root {
            --accent: #ffffff;
            --accent-glow: transparent;
            --accent-dim: #171717;
            --accent-border: #ffffff;
            --chrome: #000000;
            --text: #ffffff;
            --text-dim: #a3a3a3;
            --text-muted: #404040;
            --hover: #0a0a0a;
            --border: #171717;
            --panel-blur: none;
        }
        
        /* ── Light Theme (Flashbang Mode) ─────────────────────────── */
        body[data-theme="light"] {
            --chrome: #ffffff;
            --text: #000000;
            --text-dim: #111111;
            --text-muted: #333333;
            --hover: rgba(0, 0, 0, 0.05);
            --border: rgba(0, 0, 0, 0.15);
        }


        body {
            margin: 0;
            padding: 0;
            font-family: 'Geist Mono', monospace;
            background: transparent;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: #000000;
            border: 1px solid #171717;
            border-top: none;
            overflow-y: auto;
            overflow-x: hidden;
            max-height: 100vh; /* Controlled by BrowserView height cap in main.js */
            /* Removed slow slideDown animation */
            position: relative;
        }

        body[data-theme="light"] .container {
            background: #ffffff !important;
            border-color: #000000 !important;
            box-shadow: none !important;
        }

        body[data-theme="light"] .container::before {
            background: none !important;
        }

        body[data-theme="light"] .suggestion-item:hover {
            background: rgba(0,0,0,0.05) !important;
            color: #000 !important;
        }

        body[data-theme="light"] .suggestion-item.selected {
            background: var(--accent-dim) !important;
            color: var(--accent) !important;
        }

        body[data-theme="light"] .type {
            background: rgba(0,0,0,0.05) !important;
            color: rgba(0,0,0,0.5) !important;
        }

        body[data-theme="light"] .category-header::after {
            background: rgba(0,0,0,0.1) !important;
        }

        body[data-theme="light"] .refinement-pill {
            background: rgba(0,0,0,0.03) !important;
            border-color: rgba(0,0,0,0.08) !important;
            color: #333 !important;
        }

        body[data-theme="light"] .refinement-pill:hover {
            background: rgba(0,0,0,0.06) !important;
            color: #000 !important;
        }


        /* ── Custom Scrollbar ───────────────────────────────── */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        .container:hover::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top-light highlight to match topbar */
        .container::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 15%);
            pointer-events: none;
        }

        .suggestion-list {
            list-style: none;
            margin: 0;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            z-index: 2; position: relative;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            color: var(--text-dim);
            border: 1px solid transparent;
        }

        .suggestion-item:hover {
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.85);
            transform: translateX(2px);
        }

        .suggestion-item.selected {
            background: var(--accent-dim);
            border-color: var(--accent-border);
            color: #fff;
            position: relative;
        }

        /* Selected accent left-marker to match tab-activeunderline */
        .suggestion-item.selected::before {
            content: ''; position: absolute; left: 0; top: 25%; bottom: 25%;
            width: 3px; background: var(--accent);
        }

        .icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--accent);
            opacity: 0.75;
            transition: all 0.2s;
        }

        .suggestion-item:hover .icon,
        .suggestion-item.selected .icon {
            opacity: 1; transform: scale(1.15);
        }

        .text {
            flex: 1;
            font-size: 13.5px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.1px;
        }

        .type {
            font-size: 9.5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            background: #171717;
            padding: 3px 8px;
            opacity: 0.6;
            transition: all 0.2s;
        }

        /* ── Categories & Refinements ───────────────────────── */
        .category-header {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 12px 16px 4px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .category-header::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.03);
        }

        .refinements-bar {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            background: rgba(255,255,255,0.01);
        }
        .refinements-bar::-webkit-scrollbar { display: none; }

        .refinement-pill {
            padding: 6px 14px;
            background: #0a0a0a;
            border: 1px solid #171717;
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        .refinement-pill:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
            color: #fff;
            transform: translateY(-1px);
        }

        /* Special Best Match styling */
        .suggestion-item.best-match {
            background: var(--accent-dim);
            opacity: 0.95;
            border-left: 2px solid var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="refinements" class="refinements-bar" style="display:none;"></div>
        <div class="suggestion-list" id="list">
            <!-- Suggestions injected here -->
        </div>
    </div>
    <script src="suggestions.js"></script>
</body>
</html>
