<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com;">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <style>
        :root {
            --accent: #a855f7;
            --accent-glow: rgba(168,85,247,0.4);
            --chrome: #0d0d10;
            --text: #ffffff;
            --text-dim: rgba(255,255,255,0.5);
            --text-muted: rgba(255,255,255,0.28);
            --hover: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08);
            --panel-blur: blur(32px) saturate(210%);
        }

        body {
            margin: 0;
            padding: 12px 12px 24px 12px; /* Increased bottom padding to prevent curve clipping */
            font-family: 'Inter', -apple-system, sans-serif;
            background: transparent;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: rgba(14, 14, 18, 0.82);
            backdrop-filter: var(--panel-blur);
            border: 1px solid var(--border);
            border-radius: 24px; /* Slightly more aggressive rounding */
            box-shadow: none;
            overflow: hidden;
            animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            margin-bottom: 4px;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Top-light highlight to match topbar */
        .container::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 15%);
            pointer-events: none;
        }

        .suggestion-list {
            list-style: none;
            margin: 0;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            z-index: 2; position: relative;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            color: var(--text-dim);
            border: 1px solid transparent;
        }

        .suggestion-item:hover {
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.85);
            transform: translateX(2px);
        }

        .suggestion-item.selected {
            background: rgba(168, 85, 247, 0.12);
            border-color: rgba(168, 85, 247, 0.25);
            color: #fff;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            transform: translateX(4px);
            position: relative;
        }

        /* Selected accent left-marker to match tab-activeunderline */
        .suggestion-item.selected::before {
            content: ''; position: absolute; left: 0; top: 25%; bottom: 25%;
            width: 3px; background: var(--accent); border-radius: 0 4px 4px 0;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--accent);
            opacity: 0.75;
            transition: all 0.2s;
        }

        .suggestion-item:hover .icon,
        .suggestion-item.selected .icon {
            opacity: 1; transform: scale(1.15);
        }

        .text {
            flex: 1;
            font-size: 13.5px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.1px;
        }

        .type {
            font-size: 9.5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.04);
            padding: 3px 8px;
            border-radius: 6px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="suggestion-list" id="list">
            <!-- Suggestions injected here -->
        </div>
    </div>
    <script src="suggestions.js"></script>
</body>
</html>
