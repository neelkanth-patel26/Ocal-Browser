<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Master</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0c;
            --border: #252525;
            --accent: #09f0a0;
            --accent-glow: rgba(9, 240, 160, 0.2);
            --accent-dim: rgba(9, 240, 160, 0.12);
            --accent-border: rgba(9, 240, 160, 0.2);
            --card-bg: #111111;
            --card-border: #252525;
            --card-hover-bg: #1e1e1e;
            --card-hover-border: var(--accent);
            --text-primary: #e8e8e8;
            --text-secondary: #666666;
            --font: 'Geist Mono', monospace;
        }

        body[data-theme="light"] {
            --bg: #ffffff;
            --border: #e2e8f0;
            --accent: #058f60;
            --accent-glow: rgba(5, 143, 96, 0.2);
            --accent-dim: rgba(5, 143, 96, 0.12);
            --accent-border: rgba(5, 143, 96, 0.2);
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --card-hover-bg: #f1f5f9;
            --card-hover-border: var(--accent);
            --text-primary: #0f172a;
            --text-secondary: #475569;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-font-smoothing: antialiased;
            border-radius: 8px;
        }

        body {
            font-family: var(--font);
            background: transparent;
            width: 100vw; height: 100vh;
            color: var(--text-primary);
            display: flex; align-items: flex-start; justify-content: flex-start;
        }

        .popup-overlay { position: fixed; inset: 0; background: transparent; z-index: 1; border-radius: 0; }

        .media-card {
            position: absolute;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
            width: 320px; z-index: 2;
            opacity: 0; transform: translateY(-12px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            box-shadow: none !important;
        }

        .media-card.show { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }

        .header {
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 16px;
            border-radius: 0;
        }

        .header i { font-size: 16px; color: var(--accent); }
        .header h2 { font-size: 14px; font-weight: 700; color: var(--text-primary); font-family: var(--font); border-radius: 0; }

        /* Media List */
        .media-list {
            display: flex; flex-direction: column; gap: 10px;
            max-height: 300px; overflow-y: auto;
            padding-right: 4px;
            border-radius: 0;
        }

        .media-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px; padding: 12px;
            display: flex; align-items: center; gap: 14px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .media-item:hover {
            background: var(--card-hover-bg);
            border-color: var(--card-hover-border);
        }

        .media-icon {
            width: 38px; height: 38px; border-radius: 6px;
            background: var(--accent-dim); color: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }

        .media-info { flex: 1; min-width: 0; border-radius: 0; }
        .media-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); border-radius: 0; }
        .media-meta { font-size: 10px; color: var(--text-secondary); margin-top: 3px; border-radius: 0; }

        .download-btn {
            width: 30px; height: 30px; border-radius: 50% !important;
            background: rgba(255,255,255,0.06); color: var(--text-primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; cursor: pointer; transition: all 0.2s;
            border: none;
        }
        body[data-theme="light"] .download-btn {
            background: rgba(0,0,0,0.04);
        }

        .download-btn:hover {
            background: var(--accent); color: #000;
        }

        .empty-state {
            text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 12px; border-radius: 0;
        }
        .empty-state i { display: block; font-size: 28px; margin-bottom: 12px; opacity: 0.2; }

        .footer-action {
            margin-top: 8px; border-top: 1px solid var(--card-border);
            padding-top: 16px; border-radius: 0;
        }

        .primary-btn {
            width: 100%; padding: 10px 24px; border-radius: 24px !important;
            background: var(--accent); color: #000;
            font-size: 12px; font-weight: 700; border: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer; transition: all 0.2s;
            font-family: var(--font);
        }

        .primary-btn:hover {
            background: color-mix(in srgb, var(--accent) 80%, #000000);
        }

        /* Scrollbar */
        .media-list::-webkit-scrollbar { width: 4px; }
        .media-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="popup-overlay" id="popup-overlay"></div>
    <div class="media-card" id="media-card">
        <div class="header">
            <i class="fas fa-bolt"></i>
            <h2>Ocal Media Master</h2>
        </div>

        <div class="media-list" id="media-list">
            <div class="empty-state">
                <i class="fas fa-search"></i>
                Analyzing page for downloadable media assets...
            </div>
        </div>

        <div id="footer-actions" style="display:none;" class="footer-action">
            <button class="primary-btn" id="download-all-btn">
                <i class="fas fa-download"></i> DOWNLOAD ALL DETECTED IMAGES
            </button>
        </div>
    </div>

    <script src="media-popup.js"></script>
</body>
</html>
