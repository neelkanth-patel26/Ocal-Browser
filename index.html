<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' ocal:; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data: https: chrome-extension:; connect-src 'self' https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com https://clients2.google.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>
<body id="main-body">
    <!-- Ambient Neural Backdrop -->
    <div class="ambient-lighting">
        <div class="neural-point point-1"></div>
        <div class="neural-point point-2"></div>
        <div class="neural-point point-3"></div>
    </div>

    <!-- ── Column 1: Left Sidebar ─────────────────────────────────── -->
    <div class="sidebar-hover-trigger" id="sidebar-hover-trigger"></div>
    <div class="left-sidebar" id="left-sidebar">
        <!-- Top: Logo / Brand Menu -->
        <div class="sidebar-logo-container">
            <button class="sidebar-logo-btn" id="sidebar-logo-btn" title="Ocal Menu">
                <svg class="sidebar-logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="ocal-logo-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="var(--accent)" />
                            <stop offset="100%" stop-color="color-mix(in srgb, var(--accent) 30%, #000000)" />
                        </linearGradient>
                    </defs>
                    <!-- Outer premium orbital ring with custom cuts -->
                    <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 9.24 20.88 6.74 19.07 4.93L17.66 6.34C19.11 7.79 20 9.79 20 12C20 16.42 16.42 20 12 20C7.58 20 4 16.42 4 12C4 7.58 7.58 4 12 4C13.1 4 14.15 4.22 15.11 4.62L16.63 3.1C15.22 2.4 13.66 2 12 2Z" fill="url(#ocal-logo-grad)"/>
                    <!-- Inner nesting C-curve representing Ocal smart core -->
                    <path d="M12 7C9.24 7 7 9.24 7 12C7 14.76 9.24 17 12 17C14.76 17 17 14.76 17 12C17 10.9 16.64 9.88 16.03 9.06L14.61 10.48C14.86 10.92 15 11.44 15 12C15 13.66 13.66 15 12 15C10.34 15 9 13.66 9 12C9 10.34 10.34 9 12 9C12.56 9 13.08 9.14 13.52 9.39L14.94 7.97C14.12 7.36 13.1 7 12 7Z" fill="url(#ocal-logo-grad)"/>
                    <!-- Central focal point -->
                    <circle cx="12" cy="12" r="2" fill="url(#ocal-logo-grad)"/>
                </svg>
            </button>
        </div>

        <!-- Top Shortcuts: Bookmarks & Games -->
        <div class="sidebar-top-shortcuts">
            <button class="sidebar-item" id="sb-book-btn" data-title="Bookmarks (Start Page)">
                <i class="fas fa-book-open"></i>
            </button>
            <button class="sidebar-item" id="sb-games-btn" data-title="Games Hub">
                <i class="fas fa-gamepad"></i>
            </button>
        </div>

        <div class="sidebar-separator"></div>

        <!-- Middle: Social Shortcuts / Web Apps & AI -->
        <div class="sidebar-shortcuts">
            <button class="sidebar-item social-btn" id="sb-wa-btn" data-url="https://web.whatsapp.com" data-title="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </button>
            <button class="sidebar-item social-btn" id="sb-ig-btn" data-url="https://www.instagram.com" data-title="Instagram">
                <i class="fab fa-instagram"></i>
            </button>
            <button class="sidebar-item social-btn" id="sb-tw-btn" data-url="https://x.com" data-title="Twitter/X">
                <i class="fab fa-x-twitter"></i>
            </button>
            <button class="sidebar-item social-btn" id="sb-dc-btn" data-url="https://discord.com/app" data-title="Discord">
                <i class="fab fa-discord"></i>
            </button>
            <button class="sidebar-item social-btn" id="sb-sp-btn" data-url="https://open.spotify.com" data-title="Spotify">
                <i class="fab fa-spotify"></i>
            </button>
        </div>

        <!-- Bottom: Bookmarks, History, Settings -->
        <div class="sidebar-bottom">
            <button class="sidebar-item" id="sb-saves-btn" data-title="Saved Bookmarks">
                <i class="far fa-heart"></i>
            </button>
            <button class="sidebar-item" id="sb-history-btn" data-title="History">
                <i class="fas fa-clock-rotate-left"></i>
            </button>
            <button class="sidebar-item" id="sb-settings-btn" data-title="Easy Setup / Settings">
                <i class="fas fa-sliders"></i>
            </button>
        </div>
    </div>

    <!-- ── Row 1: Tab Bar ─────────────────────────────────────────── -->
    <div class="tab-bar">
        <div class="tab-area-container">
            <div id="tab-list"></div>
            <button class="new-tab-btn" id="new-tab-btn" title="New tab"><i class="fas fa-plus"></i></button>
        </div>
        <div class="tab-drag-spacer"></div>
        <div class="invisible-wall"></div>
        <div class="window-controls">
            <div class="ctrl-btn" id="min-btn">
                <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="5.5" width="8" height="1.2" fill="currentColor"/></svg>
            </div>
            <div class="ctrl-btn" id="max-btn">
                <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2.5" y="2.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
            </div>
            <div class="ctrl-btn ctrl-close" id="close-btn">
                <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2.5 2.5l7 7M9.5 2.5l-7 7" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
            </div>
        </div>
    </div>

    <!-- ── Row 2: Navigation Bar ──────────────────────────────────── -->
    <div class="nav-bar">
        
        <!-- Left: nav controls -->
        <div class="nav-controls">
            <button class="nav-btn" id="back-btn" title="Back"><i class="fas fa-arrow-left"></i></button>
            <button class="nav-btn" id="forward-btn" title="Forward"><i class="fas fa-arrow-right"></i></button>
            <button class="nav-btn" id="reload-btn" title="Reload"><i class="fas fa-rotate-right"></i></button>
        </div>

        <!-- Center: address bar -->
        <div class="omnibox" id="omnibox">
            <div class="omnibox-shield" id="shield-status" title="AdBlocker Active">
                <i class="fas fa-shield-halved"></i>
                <span id="page-time-chip">0s</span>
            </div>
            <div class="omnibox-ghost" id="proxy-status" title="Privacy Proxy Active" style="display:none;">
                <i class="fas fa-ghost"></i>
            </div>
            <div class="omnibox-identity" id="identity-btn">
                <i class="fas fa-lock site-lock-icon"></i>
            </div>
            <div class="url-field-group">
                <div class="omnibox-icon"></div>
                <div class="url-overlay-area">
                    <div class="pretty-url" id="pretty-url"></div>
                    <input type="text" class="omnibox-input" id="address-input" placeholder="Search or enter address" autocomplete="off" spellcheck="false">
                </div>
            </div>
            <div class="omnibox-actions">
                <button class="omni-btn" id="pip-btn" title="Popout Video" style="display:none; color: var(--accent);"><i class="fas fa-up-right-from-square"></i></button>
                <button class="omni-btn" id="bookmark-heart-btn" title="Bookmark this page"><i class="far fa-heart"></i></button>
                <button class="omni-btn" id="screenshot-btn" title="Screenshot"><i class="fas fa-camera"></i></button>
                <button class="omni-btn" id="download-icon-btn" title="Downloads"><i class="fas fa-arrow-down"></i></button>
            </div>
        </div>

        <!-- Right: toolbar actions -->
        <div class="invisible-wall"></div>
        <div class="toolbar-actions">
            <button class="tool-btn media-master-btn" id="media-master-btn" title="Ocal Media Master" style="display:none;">
                <i class="fas fa-layer-group"></i>
                <span id="media-count-chip">0</span>
            </button>
            <button class="tool-btn" id="split-screen-btn" title="Split Screen"><i class="fas fa-columns"></i></button>
            <button class="tool-btn" id="extensions-toolbar-btn" title="Extensions"><i class="fas fa-puzzle-piece"></i></button>
            <button class="ai-pill" id="ai-toolbar-btn">
                <i class="fas fa-wand-magic-sparkles"></i>
                <span>AI</span>
            </button>
            <button class="tool-btn" id="bookmarks-sidebar-btn" title="Bookmarks"><i class="fas fa-bookmark"></i></button>
            <button class="tool-btn" id="file-manager-btn" title="System Explorer"><i class="fas fa-folder-tree"></i></button>
            <button class="tool-btn" id="history-sidebar-btn" title="History"><i class="fas fa-clock-rotate-left"></i></button>
            <button class="tool-btn" id="burger-menu-btn" title="Menu"><i class="fas fa-ellipsis-vertical"></i></button>
        </div>
    </div>

    <!-- ── Row 3: Bookmark Bar ────────────────────────────────────── -->
    <div class="bookmark-bar" id="bookmark-bar"></div>



    <!-- Sidebar App Header Panel -->
    <div id="sidebar-app-header" class="sidebar-app-header">
        <div class="sidebar-app-title-group">
            <i id="sidebar-app-header-icon" class="fab fa-instagram"></i>
            <span id="sidebar-app-header-title">Instagram</span>
        </div>
        <div class="sidebar-app-actions">
            <button class="sidebar-app-action-btn" id="sidebar-app-back-btn" title="Back"><i class="fas fa-chevron-left"></i></button>
            <button class="sidebar-app-action-btn" id="sidebar-app-reload-btn" title="Reload"><i class="fas fa-rotate-right"></i></button>
            <button class="sidebar-app-action-btn" id="sidebar-app-close-btn" title="Close"><i class="fas fa-xmark"></i></button>
        </div>
    </div>

    <!-- ── Row 4: Floating Web Content Frame ──────────────────────── -->
    <div class="web-content-container" id="web-content-container"></div>

    <!-- Toast -->
    <div class="bm-toast" id="bm-toast"></div>

    <!-- Split Close Confirmation Modal -->
    <div class="split-confirm-modal-overlay" id="split-confirm-modal" style="display: none;">
        <div class="split-confirm-modal">
            <div class="split-confirm-icon">
                <i class="fas fa-triangle-exclamation"></i>
            </div>
            <h3>Close Split Workspace?</h3>
            <p>Are you sure you want to close this split screen workspace? All active pages inside it will be closed.</p>
            <div class="split-confirm-actions">
                <button class="split-confirm-btn cancel-btn" id="split-confirm-cancel-btn">Cancel</button>
                <button class="split-confirm-btn confirm-btn" id="split-confirm-close-btn">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Undo Split Tab Toast -->
    <div class="split-undo-toast" id="split-undo-toast">
        <div class="split-undo-content">
            <i class="fas fa-columns"></i>
            <span>Split workspace closed</span>
        </div>
        <button class="split-undo-btn" id="split-undo-btn">
            <i class="fas fa-rotate-left"></i> Undo
        </button>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
