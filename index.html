<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body id="main-body">
    <div class="tab-bar">
        <div id="tab-list">
            <!-- Tabs injected here -->
        </div>
        <i class="fas fa-plus" id="new-tab-btn" style="font-size: 11px; color: #555; cursor: pointer; -webkit-app-region: no-drag; margin-left: 10px;"></i>
        
        <div style="flex: 1; -webkit-app-region: drag;"></div>

        <div class="window-controls">
            <div class="control-btn" id="min-btn"><i class="fas fa-minus"></i></div>
            <div class="control-btn" id="max-btn"><i class="far fa-square"></i></div>
            <div class="control-btn close" id="close-btn"><i class="fas fa-times"></i></div>
        </div>
    </div>

    <header class="nav-row">
        <div class="nav-btns">
            <i class="fas fa-chevron-left nav-btn" id="back-btn"></i>
            <i class="fas fa-chevron-right nav-btn" id="forward-btn"></i>
            <i class="fas fa-redo nav-btn" id="reload-btn" style="font-size: 13px;"></i>
        </div>
        
        <div class="address-bar-container">
            <div class="address-bar-wrapper">
                <i class="fas fa-search" id="engine-icon-top" style="font-size: 11px; color: #888;"></i>
                <input type="text" class="address-input" id="address-input" placeholder="Search or enter address">
                
                <div class="address-actions">
                    <i class="far fa-heart action-icon" id="bookmark-btn"></i>
                    <div class="download-container">
                        <i class="fas fa-arrow-down action-icon"></i>
                        <span class="dot"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="extra-actions">
            <div class="ai-btn" id="ai-toolbar-btn">
                <i class="fas fa-wand-magic-sparkles"></i>
                <span>AI</span>
            </div>
            <i class="fas fa-bars menu-btn" id="burger-menu-btn"></i>
        </div>
    </header>

    <div class="right-sidebar" id="right-sidebar">
        <div class="sidebar-header">
            <h3>Customization</h3>
            <i class="fas fa-times" id="close-sidebar"></i>
        </div>
        <div class="sidebar-content">
            <div class="section-title">Themes</div>
            <div class="theme-grid">
                <div class="theme-opt" style="background:#070707" onclick="changeBg('#070707')"></div>
                <div class="theme-opt" style="background:#1a1a1a" onclick="changeBg('#1a1a1a')"></div>
                <div class="theme-opt" style="background:#003366" onclick="changeBg('#003366')"></div>
                <div class="theme-opt" style="background:#4a0000" onclick="changeBg('#4a0000')"></div>
            </div>
            
            <div class="sidebar-item" onclick="window.electronAPI.navigateTo('file://' + window.location.pathname.replace('index.html', 'game.html'))">
                <i class="fas fa-gamepad"></i>
                <span>Play Ocal Runner</span>
            </div>
            <div class="sidebar-item" id="sidebar-settings-btn">
                <i class="fas fa-cog"></i>
                <span>Browser Settings</span>
            </div>
            <div class="sidebar-item" onclick="location.reload()">
                <i class="fas fa-sync"></i>
                <span>Refresh UI</span>
            </div>

            <div class="bookmarks-section">
                <div class="section-title">Bookmarks</div>
                <div id="bookmarks-list">
                    <!-- Bookmarks will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
