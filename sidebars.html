<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com;">
<title>Ocal Sidebars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --accent: #09f0a0;
    --accent-glow: rgba(9, 240, 160, 0.2);
    --accent-dim: rgba(9, 240, 160, 0.12);
    --accent-border: #09f0a0;
    --bg: #1a1a1e;
    --panel-bg: #1a1a1e;
    --border: #2d2d30;
    --hover: #232328;
    --glass: #1a1a1e;
    --glass-hover: #232328;
    --glass-border: #2d2d30;
    --card-bg: #1a1a1e;
    --card-border: #2d2d30;
    --card-hover-bg: #28282d;
    --card-hover-border: var(--accent);
    --input-bg: #111115;
    --input-border: #28282d;
    --tab-strip-bg: rgba(255, 255, 255, 0.02);
    --text: #e8e8e8;
    --text-dim: #9ca3af;
    --text-muted: #4b5563;
    --radius: 12px;
}

body[data-theme="light"] {
    --bg: #ffffff;
    --panel-bg: #ffffff;
    --border: #e2e8f0;
    --hover: #f1f5f9;
    --glass: #ffffff;
    --glass-hover: #f1f5f9;
    --glass-border: #e2e8f0;
    --card-bg: #f9f9f9;
    --card-border: rgba(0, 0, 0, 0.05);
    --card-hover-bg: #f1f5f9;
    --card-hover-border: var(--accent);
    --input-bg: #ffffff;
    --input-border: #e2e8f0;
    --tab-strip-bg: rgba(0, 0, 0, 0.02);
    --text: #0f172a;
    --text-dim: #475569;
    --text-muted: #94a3b8;
}

html, body {
    background: transparent;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    pointer-events: none;
    font-family: 'Geist Mono', monospace;
    border-radius: var(--radius);
}

.overlay { width: 100vw; height: 100vh; position: relative; pointer-events: none; }

.backdrop {
    position: absolute; inset: 0; background: rgba(0,0,0,0.25);
    backdrop-filter: none; opacity: 0; pointer-events: none;
    transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.backdrop.show { opacity: 1; pointer-events: auto; }

/* ── Panel Architecture ────────────────────────────────────── */
.panel {
    position: fixed; right: 10px; top: 10px; bottom: 10px; width: 370px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex; flex-direction: column; overflow: hidden;
    transform: translateX(420px);
    transition: transform 0.38s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s;
    opacity: 0;
    z-index: 1000;
    pointer-events: auto;
    box-shadow: none !important;
}
.panel::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 15%);
    pointer-events: none;
    border-radius: inherit;
    z-index: 1001;
}
.panel.open { transform: translateX(0) scale(1); opacity: 1; }

/* ── Panel Header ─────────────────────────────────────────── */
.panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: var(--bg);
}
.panel-title {
    font-size: 15px; font-weight: 700; color: var(--text);
    letter-spacing: -0.01em;
}
.panel-close {
    width: 28px; height: 28px; border-radius: 50% !important;
    background: transparent;
    border: none;
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 11px;
    transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
}
.panel-close:hover { background: rgba(255,255,255,0.06); color: #fff; transform: scale(1.08); border-color: transparent; }

/* ── Premium Pill Tabs ───────────────────────────────────────── */
.tab-strip-container { padding: 16px 16px 8px; }
.tab-strip {
    display: flex;
    background: var(--tab-strip-bg);
    border: 1px solid var(--card-border);
    border-radius: 100px !important;
    padding: 2px; gap: 2px; position: relative;
}
.tab-pill {
    flex: 1; height: 34px; border: none; background: transparent;
    color: var(--text-dim); cursor: pointer; border-radius: 100px !important;
    font-size: 11.5px; font-weight: 600;
    display: flex; align-items: center;
    justify-content: center; gap: 7px;
    transition: all 0.2s;
    z-index: 1; letter-spacing: 0.1px;
}
.tab-pill.active {
    color: #000000;
    background: var(--accent, #09f0a0);
    box-shadow: none !important;
    border: 1px solid var(--accent, #09f0a0);
    font-weight: 700;
}
.tab-pill i { font-size: 12px; color: inherit; transition: transform 0.2s; }
.tab-pill:hover:not(.active) { color: var(--text); background: var(--hover); }

/* ── Search Bar ────────────────────────────────────────────── */
.panel-search { padding: 0 16px 12px; flex-shrink: 0; }
.search-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 100px !important; padding: 10px 14px;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: none !important;
}
.search-row:focus-within {
    border-color: var(--accent, #09f0a0) !important;
    background: rgba(0, 0, 0, 0.4) !important;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.3) !important;
}
.search-row i { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
.search-row input {
    flex: 1; background: none; border: none; outline: none;
    font-size: 13px; color: var(--text); font-family: 'Geist Mono', monospace;
}
.search-row input::placeholder { color: var(--text-muted); }

/* ── Content Area ──────────────────────────────────────────── */
.panel-body { flex: 1; overflow-y: overlay; scrollbar-width: none; }
.panel-body::-webkit-scrollbar { display: none; }

.bm-toolbar { display: flex; gap: 6px; padding: 4px 16px 12px; }
.bm-tool-btn {
    flex: 1; height: 34px; border-radius: 8px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text); font-size: 11.5px;
    font-weight: 600; font-family: 'Geist Mono', monospace;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center; gap: 6px;
    transition: all 0.2s;
}
.bm-tool-btn:hover {
    border-color: var(--card-hover-border); color: #fff;
    background: var(--card-hover-bg);
    transform: none;
    box-shadow: none !important;
}

.bm-item, .bm-folder-hdr {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 8px;
    margin: 4px 10px; cursor: pointer;
    transition: all 0.18s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative; border: 1px solid var(--card-border);
    background: var(--card-bg);
}
.bm-item:hover, .bm-folder-hdr:hover {
    background: var(--card-hover-bg);
    border-color: var(--card-hover-border);
    transform: none;
}
.current-active { 
    background: rgba(255,255,255,0.05) !important; 
    border-color: var(--accent) !important;
    box-shadow: none !important;
}
.current-active::before {
    content: ''; position: absolute; left: -10px; top: 25%; bottom: 25%;
    width: 3px; background: var(--accent);
    border-radius: var(--radius);
    box-shadow: none !important;
}

.active-badge {
    font-size: 9.5px; font-weight: 800; color: var(--bg);
    background: var(--text); border: 1px solid var(--text);
    padding: 3px 10px; border-radius: var(--radius); flex-shrink: 0; margin-left: auto;
    letter-spacing: 0.02em; text-transform: uppercase;
    box-shadow: none !important;
}

.bm-favicon, .hist-favicon { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; background: rgba(255,255,255,0.05); }
.bm-info, .hist-info { flex: 1; min-width: 0; }
.bm-title, .hist-title { font-size: 13px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; outline: none; }
.bm-url, .hist-meta { font-size: 10.5px; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.bm-drag-handle { font-size: 11px; color: var(--text-muted); cursor: grab; opacity: 0; transition: 0.2s; }
.bm-item:hover .bm-drag-handle { opacity: 0.6; }

.bm-item-actions { display: flex; align-items: center; gap: 2px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
.bm-item:hover .bm-item-actions { opacity: 1; }

.bm-folder-chevron { font-size: 7px; color: var(--text-muted); width: 10px; transition: transform 0.2s; flex-shrink: 0; }
.bm-folder-chevron.open { transform: rotate(90deg); }
.bm-folder-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; outline: none; }
.bm-folder-count { font-size: 9px; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 1px 5px; border-radius: var(--radius); flex-shrink: 0; border: 1px solid var(--border); }
.bm-folder-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
.bm-folder-hdr:hover .bm-folder-actions { opacity: 1; }
.bm-folder-icon { color: var(--accent); font-size: 13px; }
.icon-btn .fa-folder-open { color: var(--accent); }

.bm-item.indented { margin-left: 18px; width: calc(100% - 26px); }

.bm-back-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; margin: 4px 14px 12px;
    background: transparent; border: 1px dashed var(--border);
    border-radius: var(--radius); cursor: pointer; transition: 0.2s;
    font-size: 13px; font-weight: 600; color: var(--text);
}
.bm-back-row:hover { background: var(--hover); border-style: solid; border-color: var(--text); }
.bm-back-row i { color: var(--accent); font-size: 11px; }

.bm-breadcrumb {
    padding: 12px 20px 8px; font-size: 11px; font-weight: 700;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;
    display: flex; align-items: center; gap: 6px;
}
.bm-breadcrumb i { font-size: 9px; opacity: 0.5; }

/* ── Section Labels ────────────────────────────────────────── */
.recom-title, .bm-section-label, .hist-date-label {
    padding: 14px 20px 6px;
    font-size: 10px;
    font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    display: flex; align-items: center; gap: 8px;
}
.recom-title::after, .bm-section-label::after, .hist-date-label::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
}
.recom-title i, .bm-section-label i, .hist-date-label i { color: var(--accent); font-size: 11px; }

/* ── Recommendation Grid ───────────────────────────────────── */
.hist-recom { padding: 0; border-bottom: 1px solid var(--border); }
.recom-grid { display: flex; gap: 8px; overflow-x: auto; padding: 8px 16px 12px; }
.recom-grid::-webkit-scrollbar { display: none; }
.recom-item {
    min-width: 72px; padding: 10px 8px; border-radius: var(--radius);
    background: var(--bg); border: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all 0.2s;
}
.recom-item:hover { border-color: var(--text); background: var(--hover); }
.recom-item img { width: 22px; height: 22px; border-radius: var(--radius); }
.recom-name { font-size: 10px; color: var(--text-dim); text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.hist-clear-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 14px;
    margin: 8px 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 11.5px;
    font-weight: 700;
    color: #ef4444;
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.15);
    transition: all 0.2s;
}
.hist-clear-row:hover {
    background: rgba(239, 68, 68, 0.15);
    border-color: #ef4444;
    color: #ff5f5f;
}

.hist-item {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 12px; margin: 4px 10px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 8px;
    cursor: pointer; position: relative; overflow: hidden;
    transition: all 0.2s;
}
.hist-item::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent);
    opacity: 0; transition: opacity 0.2s; border-radius: 8px;
}
.hist-item:hover {
    background: rgba(255, 255, 255, 0.045);
    border-color: rgba(255, 255, 255, 0.08);
    transform: none;
    box-shadow: none !important;
}
.hist-item:hover::before { opacity: 1; }
.hist-item .hist-favicon {
    width: 32px; height: 32px; border-radius: var(--radius);
    box-shadow: none !important;
    flex-shrink: 0; background: rgba(255,255,255,0.05); object-fit: contain;
}
.hist-info { flex: 1; min-width: 0; }
.hist-title { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-meta { font-size: 11px; font-weight: 500; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }

.hist-item .hist-del { 
    opacity: 0; transform: scale(1); transition: all 0.15s;
    background: var(--bg); color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 50% !important; flex-shrink: 0;
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; 
    font-size: 10px; cursor: pointer;
}
.hist-item:hover .hist-del { opacity: 1; transform: scale(1); }
.hist-del:hover { background: rgba(239,68,68,0.2) !important; color: #fff !important; }

.hist-item {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 12px; margin: 4px 10px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    cursor: pointer; position: relative; overflow: hidden;
    transition: all 0.2s;
}
.hist-item::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent);
    opacity: 0; transition: opacity 0.2s; border-radius: 8px;
}
.hist-item:hover {
    background: var(--card-hover-bg);
    border-color: var(--card-hover-border);
    transform: none;
    box-shadow: none !important;
}

/* ── Advanced History Grouping Style ── */
.hist-group-container {
    margin: 4px 10px;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    border-radius: 8px;
    overflow: hidden;
    transition: all 0.2s;
}
.hist-group-container:hover {
    border-color: var(--card-hover-border);
}
.hist-group-header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    cursor: pointer; position: relative;
    user-select: none;
    transition: background 0.18s;
}
.hist-group-header:hover {
    background: var(--card-hover-bg);
}
.hist-group-header .toggle-chevron {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s ease;
    width: 12px;
    text-align: center;
}
.hist-group-header.expanded .toggle-chevron {
    transform: rotate(90deg);
}
.hist-group-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
}
.hist-group-children {
    border-top: 1px solid var(--border);
    background: rgba(0, 0, 0, 0.12);
}
body[data-theme="light"] .hist-group-children {
    background: rgba(0, 0, 0, 0.015);
}
.hist-group-children .hist-item {
    margin: 0 !important;
    border: none !important;
    border-bottom: 1px solid rgba(255,255,255,0.02) !important;
    border-radius: 0 !important;
    padding-left: 36px !important;
    background: transparent !important;
}
body[data-theme="light"] .hist-group-children .hist-item {
    border-bottom: 1px solid rgba(0,0,0,0.02) !important;
}
.hist-group-children .hist-item:last-child {
    border-bottom: none !important;
}
.hist-group-children .hist-item:hover {
    background: var(--card-hover-bg) !important;
}
.hist-group-header .hist-del {
    opacity: 0; transform: scale(1); transition: all 0.15s;
    background: var(--bg); color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 50% !important; flex-shrink: 0;
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    font-size: 10px; cursor: pointer; margin-left: auto;
}
.hist-group-header:hover .hist-del { opacity: 1; }
.hist-group-header .hist-del:hover { background: rgba(239,68,68,0.2) !important; color: #fff !important; }

/* ── Download / Files Specifics 3.0 ── */
.dl-item {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 14px; margin: 4px 10px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px; position: relative; overflow: hidden;
    transition: all 0.2s;
    backdrop-filter: none !important;
}
.dl-item:hover {
    background: var(--card-hover-bg);
    border-color: var(--card-hover-border);
    transform: none;
    box-shadow: none !important;
}

.dl-icon {
    width: 44px; height: 44px; border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 18px; flex-shrink: 0;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
}

/* Color Coding via Type */
.dl-item[data-type="pdf"] .dl-icon { color: #f43f5e; background: rgba(244, 63, 94, 0.1); border-color: rgba(244, 63, 94, 0.2); }
.dl-item[data-type="img"] .dl-icon { color: #3b82f6; background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.2); }
.dl-item[data-type="media"] .dl-icon { color: #a855f7; background: rgba(168, 85, 247, 0.1); border-color: rgba(168, 85, 247, 0.2); }
.dl-item[data-type="code"] .dl-icon { color: #10b981; background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); }

.dl-item:hover .dl-icon {
    transform: none;
    box-shadow: none;
}

.dl-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.dl-name { font-size: 13.5px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.2px; }
.dl-status {
    font-size: 10.5px; color: var(--text-muted);
    font-weight: 600; display: flex; align-items: center; justify-content: space-between;
    text-transform: uppercase; letter-spacing: 0.5px;
}

.dl-bar-bg {
    width: 100%; height: 4px;
    background: var(--hover);
    border-radius: var(--radius); overflow: hidden;
    margin-top: 6px;
}
.dl-bar {
    height: 100%;
    background: var(--text);
    border-radius: var(--radius);
    transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    box-shadow: none !important;
}
.dl-bar::after {
    display: none;
}

.dl-actions {
    display: flex; align-items: center; gap: 6px;
    opacity: 0; transform: translateX(10px);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.dl-item:hover .dl-actions { opacity: 1; transform: translateX(0); }
.dl-action-btn {
    width: 30px; height: 30px; border-radius: 50% !important;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; transition: 0.2s;
}
.dl-action-btn:hover { background: rgba(255,255,255,0.06); color: #fff; border-color: rgba(255,255,255,0.1); transform: scale(1.08); }
.dl-action-btn.del:hover { color: #f43f5e; background: rgba(244, 63, 94, 0.1); border-color: rgba(244, 63, 94, 0.2); }

/* ── Pro System Modal Layer (Glass 3.0) ── */
#modal-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    display: none; align-items: center; justify-content: center; z-index: 10000;
    pointer-events: auto; animation: modalOverlayIn 0.2s ease-out;
}
@keyframes modalOverlayIn { from { opacity: 0; } to { opacity: 1; } }

#modal-overlay.active { display: flex; }

#modal-container {
    width: 420px; background: var(--panel-bg);
    backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
    border: 1px solid var(--border);
    border-radius: 4px !important; padding: 36px 32px;
    display: flex; flex-direction: column; gap: 24px; 
    box-shadow: none !important;
    animation: modalIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); 
    text-align: center; position: relative;
}

@keyframes modalIn { 
    from { transform: scale(0.98); opacity: 0; } 
    to { transform: scale(1); opacity: 1; } 
}

#modal-icon {
    width: 56px; height: 56px; border-radius: 4px !important; 
    background: rgba(9, 240, 160, 0.08);
    border: 1px solid var(--accent-border); 
    color: var(--accent); font-size: 20px;
    display: flex; align-items: center; justify-content: center; margin: 0 auto;
    position: relative; box-shadow: none !important;
}
#modal-icon::after {
    display: none !important;
}

#modal-title { 
    font-size: 20px; font-weight: 700; color: var(--text); 
    letter-spacing: -0.02em; margin-top: 0;
    background: none;
    -webkit-background-clip: initial; 
    background-clip: initial;
    -webkit-text-fill-color: initial;
}

#modal-body { 
    font-size: 13.5px; color: var(--text-dim); 
    line-height: 1.6; font-weight: 500; padding: 0;
}

#modal-footer { display: flex; gap: 10px; }
#modal-footer button {
    flex: 1; height: 44px; border-radius: 4px !important; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background-color 0.2s ease, border-color 0.2s ease;
    border: 1px solid var(--border); font-family: 'Geist Mono', monospace;
}

#modal-cancel { 
    background: #1c1c1f; color: var(--text-dim); 
    border-color: #2d2d30 !important; 
}
#modal-cancel:hover { 
    background: #252529; border-color: #38383c !important;
    color: var(--text); transform: none !important;
}

#modal-confirm { 
    background: var(--accent) !important; color: #000 !important; 
    border-color: var(--accent) !important;
    box-shadow: none !important; 
}
#modal-confirm:hover { 
    transform: none !important; filter: brightness(1.08); 
    box-shadow: none !important; 
}
#modal-confirm:active { transform: none !important; }

.icon-btn {
    width: 28px; height: 28px; border-radius: 50% !important; background: transparent;
    border: none; color: var(--text-muted); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 11px; transition: 0.2s;
}
.icon-btn:hover { background: rgba(255,255,255,0.08); color: #fff; transform: scale(1.08); }
.icon-btn.del:hover { color: #ef4444; }

/* Empty State UI */
.empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 40px; color: var(--text-muted); text-align: center; gap: 20px;
}
.empty-state i { 
    font-size: 48px; color: var(--accent); opacity: 0.15;
    filter: drop-shadow(0 0 20px var(--accent-glow));
}
.empty-state p { 
    font-size: 14px; font-weight: 600; color: var(--text-dim);
    letter-spacing: -0.01em; opacity: 0.7;
}

/* Settings items */
.setting-row { padding: 14px 18px; border-bottom: 1px solid var(--border); }
.toggle {
    width: 44px; height: 22px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius); position: relative; cursor: pointer;
    transition: all 0.2s;
}
.toggle.on { background: var(--text); }
.toggle::after { 
    content: ''; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; 
    background: var(--text); border-radius: var(--radius); transition: 0.2s; 
}
.toggle.on::after { left: 25px; background: var(--bg); }
.dd-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Screenshot Toolbar ────────────────────────────────────────── */
.ss-toolbar {
    position: fixed; display: none; background: var(--bg);
    backdrop-filter: none !important; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 6px; gap: 4px; z-index: 10000;
    box-shadow: none !important; pointer-events: auto;
    left: 50%; top: 60px; transform: translateX(-50%);
    animation: ssPop 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes ssPop { from { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(0.95); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }
.ss-option {
    padding: 10px 16px; border-radius: var(--radius); display: flex; flex-direction: column;
    align-items: center; gap: 6px; cursor: pointer; min-width: 76px; transition: all 0.2s;
}
.ss-option:hover { background: rgba(255,255,255,0.06); }
.ss-option i { font-size: 16px; color: var(--accent); }
.ss-option span { font-size: 11px; font-weight: 600; color: var(--text-dim); }
</style>
</head>
<body>
<div class="overlay" id="overlay">
    <div class="backdrop" id="backdrop"></div>

    <div class="panel" id="sidebar">
        <!-- Header -->
        <div class="panel-header">
            <span class="panel-title" id="sb-title">Bookmarks</span>
            <div style="display:flex;gap:6px;align-items:center">
                <button class="panel-close" id="settings-nav-btn" title="Settings" style="font-size:12px;color:var(--text-muted)"><i class="fas fa-gear"></i></button>
                <button class="panel-close" id="sb-close-btn" title="Close"><i class="fas fa-xmark"></i></button>
            </div>
        </div>

        <!-- Tab strip -->
        <div class="tab-strip-container">
            <div class="tab-strip">
                <button class="tab-pill active" data-tab="bookmarks"><i class="fas fa-bookmark"></i>Saves</button>
                <button class="tab-pill" data-tab="history"><i class="fas fa-clock-rotate-left"></i>History</button>
                <button class="tab-pill" data-tab="downloads"><i class="fas fa-folder"></i>Files</button>
            </div>
        </div>

        <!-- Search -->
        <div class="panel-search">
            <div class="search-row">
                <i class="fas fa-magnifying-glass"></i>
                <input type="text" id="sb-search" placeholder="Search...">
            </div>
        </div>

        <!-- Bookmark toolbar -->
        <div class="bm-toolbar" id="bm-toolbar">
            <button class="bm-tool-btn" id="add-folder-btn"><i class="fas fa-folder-plus"></i>New Folder</button>
            <button class="bm-tool-btn" id="sort-bms-btn"><i class="fas fa-arrow-down-a-z"></i>Sort A–Z</button>
        </div>

        <!-- Content -->
        <div class="panel-body" id="sb-content"></div>
</div>

<div id="ss-toolbar" class="ss-toolbar">
    <div class="ss-option" id="ss-visible"><i class="fas fa-eye"></i><span>Visible</span></div>
    <div class="ss-option" id="ss-full"><i class="fas fa-expand"></i><span>Full Page</span></div>
    <div class="ss-option" id="ss-pdf"><i class="fas fa-file-pdf"></i><span>PDF</span></div>
</div>

<!-- Custom Modal System -->
    <div id="modal-overlay">
        <div id="modal-container">
            <div id="modal-icon"><i class="fas fa-triangle-exclamation"></i></div>
            <div id="modal-title">Confirm Action</div>
            <div id="modal-body">Are you sure you want to proceed?</div>
            <div id="modal-footer">
                <button id="modal-cancel">Cancel</button>
                <button id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>
    <script src="sidebars.js"></script>
</body>
</html>
