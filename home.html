<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ocal Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.18);
            --bg: #0c0c0e;
            --glass: rgba(255, 255, 255, 0.035);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --text-muted: rgba(255, 255, 255, 0.15);
            --tile-size: 120px;
            --tile-spacing: 20px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Dynamic Ambient Background ───────────────────────────────── */
        .ambient-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.5;
            transition: background 1s ease;
            animation: orb-float 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 800px;
            height: 800px;
            top: -200px;
            left: -200px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
        }

        .orb-2 {
            width: 700px;
            height: 700px;
            bottom: -150px;
            right: -150px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
            animation-delay: -5s;
        }

        @keyframes orb-float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(50px, 40px) scale(1.1);
            }
        }

        /* ── Main Content Stack ────────────────────────────────────────── */
        .content-stack {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 720px;
            padding: 0 40px;
            animation: content-in 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes content-in {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.99);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Architectural Header ──────────────────────────────────────── */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .clock {
            font-size: 80px;
            font-weight: 300;
            letter-spacing: -4px;
            line-height: 1;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
            margin-bottom: 12px;
        }

        .meta-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
            opacity: 0.8;
        }

        .meta-sep {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.6;
        }

        /* ── Professional Search ───────────────────────────────────────── */
        .search-area {
            width: 100%;
            margin-bottom: 44px;
            position: relative;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            height: 56px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 0 24px;
            backdrop-filter: blur(40px) saturate(200%);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .search-bar:focus-within {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow), 0 25px 50px rgba(0, 0, 0, 0.3);
            transform: translateY(-1px);
        }

        .search-bar i {
            font-size: 16px;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .search-bar:focus-within i {
            color: var(--accent);
        }

        .search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            color: #fff;
            font-weight: 400;
        }

        .search-input::placeholder {
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* ── Shortcut Shelf ────────────────────────────────────────────── */
        .shelf {
            display: flex;
            justify-content: center;
            gap: var(--tile-spacing);
            width: 100%;
            flex-wrap: wrap;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            width: fit-content;
        }

        .tile-icon {
            width: var(--tile-size);
            height: var(--tile-size);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--tile-size) * 0.38);
            color: var(--text-dim);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .tile-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .tile:hover {
            transform: translateY(-8px);
        }

        .tile:hover .tile-icon {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 15px 35px var(--accent-glow);
        }

        .tile:hover .tile-icon::after {
            opacity: 1;
        }

        .tile-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            transition: all 0.3s;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .tile:hover .tile-label {
            color: #fff;
            transform: scale(1.05);
        }

        /* ── Utilities ─────────────────────────────────────────────────── */
        .settings-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 18px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.5;
            z-index: 1000;
        }

        .settings-btn:hover {
            opacity: 1;
            background: var(--glass-border);
            border-color: var(--accent);
            color: #fff;
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* ── Responsiveness for Lower Resolutions ─────────────────── */
        @media (max-width: 1200px), (max-height: 800px) {
            :root {
                --tile-size: 100px;
                --tile-spacing: 16px;
            }
            .clock {
                font-size: 64px;
                letter-spacing: -2px;
            }
            .content-stack {
                max-width: 640px;
                padding: 0 20px;
            }
            .header {
                margin-bottom: 30px;
            }
            .search-area {
                margin-bottom: 34px;
            }
            .search-bar {
                height: 50px;
            }
        }

        @media (max-width: 900px), (max-height: 600px) {
            :root {
                --tile-size: 80px;
                --tile-spacing: 12px;
            }
            .clock {
                font-size: 48px;
            }
            .tile-icon {
                border-radius: 16px;
            }
            .tile-label {
                font-size: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="ambient-container">
        <div class="orb orb-1" id="orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="content-stack">
        <!-- Architecture Header -->
        <header class="header">
            <div class="clock" id="clock">00:00</div>
            <div class="meta-row">
                <span id="greeting">GOOD MORNING</span>
                <div class="meta-sep"></div>
                <span id="date-display">Monday, January 1</span>
            </div>
        </header>

        <!-- Professional Search Area -->
        <div class="search-area">
            <div class="search-bar">
                <i class="fas fa-magnifying-glass"></i>
                <input type="text" class="search-input" id="home-search" placeholder="Search the web or enter URL"
                    autofocus autocomplete="off">
            </div>
        </div>

        <!-- Shortcut Shelf -->
        <div class="shelf">
            <div class="tile" onclick="nav('youtube.com')">
                <div class="tile-icon"><i class="fab fa-youtube"></i></div>
                <span class="tile-label">YouTube</span>
            </div>
            <div class="tile" onclick="nav('spotify.com')">
                <div class="tile-icon"><i class="fab fa-spotify"></i></div>
                <span class="tile-label">Spotify</span>
            </div>
            <div class="tile" onclick="nav('amazon.com')">
                <div class="tile-icon"><i class="fab fa-amazon"></i></div>
                <span class="tile-label">Amazon</span>
            </div>
            <div class="tile" onclick="nav('discord.com')">
                <div class="tile-icon"><i class="fab fa-discord"></i></div>
                <span class="tile-label">Discord</span>
            </div>
            <div class="tile" onclick="nav('github.com')">
                <div class="tile-icon"><i class="fab fa-github"></i></div>
                <span class="tile-label">GitHub</span>
            </div>
        </div>
    </div>

    <div class="settings-btn" onclick="window.electronAPI.send('toggle-sidebar', true)">
        <i class="fas fa-gear"></i>
    </div>

    <script>
        const clockEl = document.getElementById('clock');
        const greetingEl = document.getElementById('greeting');
        const dateEl = document.getElementById('date-display');
        const searchEl = document.getElementById('home-search');
        const searchArea = document.querySelector('.search-area');
        const shelf = document.querySelector('.shelf');
        const header = document.querySelector('.header');

        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        function tick() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            clockEl.textContent = `${h}:${m}`;

            const hours = now.getHours();
            let g = 'GOOD MORNING';
            if (hours >= 12 && hours < 17) g = 'GOOD AFTERNOON';
            else if (hours >= 17) g = 'GOOD EVENING';
            greetingEl.textContent = g;

            dateEl.textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
        }
        setInterval(tick, 1000);
        tick();

        function nav(url) { window.location.href = 'https://' + url; }

        searchEl.addEventListener('keydown', e => {
            if (e.key !== 'Enter' || !searchEl.value.trim()) return;
            const q = searchEl.value.trim();
            if (/^https?:\/\//.test(q)) window.location.href = q;
            else if (/^[\w-]+\.[a-z]{2,}/.test(q) && !q.includes(' ')) window.location.href = 'https://' + q;
            else window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
        });

        // Dynamic Accent & Layout System
        function applySettings(s) {
            if (!s) return;
            const root = document.documentElement;

            // Accent
            if (s.accentColor) {
                root.style.setProperty('--accent', s.accentColor);
                const r = parseInt(s.accentColor.slice(1, 3), 16);
                const g = parseInt(s.accentColor.slice(3, 5), 16);
                const b = parseInt(s.accentColor.slice(5, 7), 16);
                root.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.3)`);
            }

            // Layout
            if (s.homeLayout) {
                if (s.homeLayout === 'top') {
                    header.style.order = "-2";
                    searchArea.style.order = "-1";
                    searchArea.style.marginBottom = "40px";
                    shelf.style.order = "1";
                } else if (s.homeLayout === 'center') {
                    header.style.order = "-1";
                    searchArea.style.order = "0";
                    searchArea.style.marginBottom = "44px";
                    shelf.style.order = "1";
                } else if (s.homeLayout === 'bottom') {
                    header.style.order = "-1";
                    searchArea.style.order = "1";
                    searchArea.style.marginTop = "40px";
                    shelf.style.order = "0";
                }
            }

            // Tile customization
            if (s.homeTileSize) root.style.setProperty('--tile-size', s.homeTileSize + 'px');
            if (s.homeTileSpacing) root.style.setProperty('--tile-spacing', s.homeTileSpacing + 'px');
        }

        if (window.electronAPI) {
            window.electronAPI.onSettingsChanged(s => applySettings(s));
            window.electronAPI.getSettings().then(s => applySettings(s));
        }
    </script>
</body>

</html>
