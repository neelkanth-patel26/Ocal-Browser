<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com;">
    <title>Ocal Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.2);
            --bg: #0c0c0e;
            --chrome: #0c0c0e;
            --chrome-border: rgba(255,255,255,0.06);
            --glass: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.08);
            --glass-hover: rgba(255,255,255,0.06);
            --text: #fff;
            --text-dim: rgba(255,255,255,0.5);
            --text-muted: rgba(255,255,255,0.25);
            --hover: rgba(255,255,255,0.07);
            --tile-size: 72px;
            --tile-gap: 16px;
            --card-radius: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }



        /* ── Main Content ─────────────────────────────────────────── */
        .content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; /* keep children centered horizontally */
            gap: 48px;
            width: 100%; max-width: 800px;
            height: 100vh; /* Fill the viewport so justify-content works */
            padding: 40px 32px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Clock / Header ───────────────────────────────────────── */
        .clock-block {
            text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .clock {
            font-size: 88px;
            font-weight: 300;
            letter-spacing: -6px;
            line-height: 1;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .clock-colon {
            animation: blink 1s step-start infinite;
            display: inline-block;
        }
        @keyframes blink { 50% { opacity: 0.3; } }

        .meta-row {
            display: flex; align-items: center; gap: 12px;
            font-size: 10px; font-weight: 600;
            letter-spacing: 3px; text-transform: uppercase;
            color: var(--text-muted);
        }
        .meta-dot {
            width: 4px; height: 4px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        /* ── Search Bar — matches topbar omnibox ─────────────────── */
        .search-wrap {
            width: 100%;
        }

        .search-bar {
            display: flex; align-items: center; gap: 14px;
            width: 100%; height: 50px;
            background: rgba(255,255,255,0.05); /* Match topbar bg */
            border: 1px solid var(--chrome-border);
            border-radius: 12px;
            padding: 0 16px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .search-bar:focus-within {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent-border);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .search-bar .search-icon {
            font-size: 13px;
            color: var(--text-muted);
            transition: color 0.3s;
            flex-shrink: 0;
        }
        .search-bar:focus-within .search-icon { color: var(--accent); }

        .search-input {
            flex: 1; background: none; border: none; outline: none;
            font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 400;
            color: #fff; letter-spacing: 0.1px;
        }
        .search-input::placeholder { color: var(--text-muted); }

        .search-enter-hint {
            font-size: 10px; font-weight: 600;
            color: var(--text-muted); letter-spacing: 0.5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 3px 8px; border-radius: 6px;
            opacity: 0;
            transition: opacity 0.2s;
            flex-shrink: 0; white-space: nowrap;
        }
        .search-bar:focus-within .search-enter-hint { opacity: 1; }

        /* ── Quick Launch Shelf ───────────────────────────────────── */
        .shelf {
            display: flex; gap: var(--tile-gap);
            justify-content: center; flex-wrap: wrap;
            width: 100%;
        }

        .tile {
            display: flex; flex-direction: column; align-items: center; gap: 9px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tile-icon {
            width: var(--tile-size); height: var(--tile-size);
            border-radius: var(--card-radius);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            color: var(--text-dim);
            transition: inherit;
            position: relative; overflow: hidden;
        }

        .tile-icon::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
            opacity: 0.4;
        }

        .tile-label {
            font-size: 11px; font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.3px;
            transition: color 0.3s;
            max-width: var(--tile-size);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-align: center;
        }

        .tile:hover .tile-icon {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.16);
            transform: translateY(-6px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.4);
        }
        .tile:hover .tile-label { color: var(--text-dim); }

        /* Site accent colors */
        .tile[data-url*="youtube"]:hover .tile-icon { color: #ff4444; border-color: rgba(255,68,68,0.3); box-shadow: 0 16px 32px rgba(255,68,68,0.12); }
        .tile[data-url*="spotify"]:hover .tile-icon { color: #1db954; border-color: rgba(29,185,84,0.3); box-shadow: 0 16px 32px rgba(29,185,84,0.12); }
        .tile[data-url*="amazon"]:hover .tile-icon  { color: #ff9900; border-color: rgba(255,153,0,0.3); box-shadow: 0 16px 32px rgba(255,153,0,0.12); }
        .tile[data-url*="discord"]:hover .tile-icon { color: #5865f2; border-color: rgba(88,101,242,0.3); box-shadow: 0 16px 32px rgba(88,101,242,0.12); }
        .tile[data-url*="github"]:hover .tile-icon  { color: #fff; border-color: rgba(255,255,255,0.25); box-shadow: 0 16px 32px rgba(255,255,255,0.1); }

        /* ── Layout & Style Variants (Moved to bottom for specificity) ── */
        .content.layout-top { justify-content: flex-start; padding-top: 80px; }
        .content.layout-center { justify-content: center; }
        .content.layout-bottom { justify-content: flex-end; padding-bottom: 100px; flex-direction: column-reverse; }

        .content.layout-bottom .clock-block { order: 2; margin-bottom: 30px; }
        .content.layout-bottom .shelf { order: 1; margin-bottom: 20px; }
        .content.layout-bottom .search-wrap { order: 0; }

        /* Style: Rectangle (Solid) */
        .tile.style-rectangle .tile-icon { 
            width: calc(var(--tile-size) * 1.4); 
            height: calc(var(--tile-size) * 0.85);
            border-radius: 12px;
            background: rgba(255,255,255,0.12);
        }
        .tile.style-rectangle .tile-label { max-width: calc(var(--tile-size) * 1.4); }

        /* Style: Monochrome (Neon) */
        .tile.style-monochrome .tile-icon {
            border-radius: 50%; background: transparent;
            border: 2px solid var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            filter: drop-shadow(0 0 5px var(--accent-glow));
        }
        .tile.style-monochrome .tile-icon i { color: var(--accent); }
        .tile.style-monochrome:hover .tile-icon {
            background: var(--accent); color: #fff;
            box-shadow: 0 0 25px var(--accent-glow);
        }
        .tile.style-monochrome:hover .tile-icon i { color: #fff; }

        /* ── Bottom Status Bar ────────────────────────────────────── */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 40px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            background: var(--chrome);
            border-top: 1px solid var(--chrome-border);
            z-index: 100;
        }

        .bottom-action {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 12px; border-radius: 8px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            font-size: 11px; font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .bottom-action i { font-size: 11px; }
        .bottom-action:hover {
            background: var(--glass-hover);
            border-color: var(--glass-border);
            color: #fff;
        }

        /* ── Responsive ───────────────────────────────────────────── */
        @media (max-width: 900px) {
            .clock { font-size: 64px; letter-spacing: -4px; }
            :root { --tile-size: 60px; }
        }
        @media (max-height: 650px) {
            .content { gap: 24px; }
            .clock { font-size: 56px; }
        }
    </style>
</head>

<body>


    <div class="content">
        <!-- Clock -->
        <div class="clock-block">
            <div class="clock" id="clock">
                <span id="clock-h">00</span><span class="clock-colon">:</span><span id="clock-m">00</span>
            </div>
            <div class="meta-row">
                <span id="greeting">GOOD MORNING</span>
                <div class="meta-dot"></div>
                <span id="date-display">...</span>
            </div>
        </div>

        <!-- Search -->
        <div class="search-wrap">
            <div class="search-bar">
                <i class="fas fa-magnifying-glass search-icon"></i>
                <input type="text" class="search-input" id="home-search"
                    placeholder="Search or enter an address" autofocus autocomplete="off">
                <span class="search-enter-hint">↵ ENTER</span>
            </div>
        </div>

        <!-- Quick Launch Shelf -->
        <div class="shelf" id="shelf">
            <div class="tile" data-url="youtube.com">
                <div class="tile-icon"><i class="fab fa-youtube"></i></div>
                <span class="tile-label">YouTube</span>
            </div>
            <div class="tile" data-url="spotify.com">
                <div class="tile-icon"><i class="fab fa-spotify"></i></div>
                <span class="tile-label">Spotify</span>
            </div>
            <div class="tile" data-url="amazon.com">
                <div class="tile-icon"><i class="fab fa-amazon"></i></div>
                <span class="tile-label">Amazon</span>
            </div>
            <div class="tile" data-url="discord.com">
                <div class="tile-icon"><i class="fab fa-discord"></i></div>
                <span class="tile-label">Discord</span>
            </div>
            <div class="tile" data-url="github.com">
                <div class="tile-icon"><i class="fab fa-github"></i></div>
                <span class="tile-label">GitHub</span>
            </div>
        </div>
    </div>

    <!-- Bottom status-bar — mirrors topbar visual language -->
    <div class="bottom-bar">
        <div class="bottom-action" id="settings-btn">
            <i class="fas fa-gear"></i> Settings
        </div>
        <div class="meta-row" style="font-size: 9px; letter-spacing: 2px; color: var(--text-muted);">
            OCAL BROWSER
        </div>
        <div class="bottom-action" id="history-btn">
            <i class="fas fa-clock-rotate-left"></i> History
        </div>
    </div>

    <script src="home.js"></script>
</body>

</html>
