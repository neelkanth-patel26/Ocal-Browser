<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com;">
    <title>Ocal Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent: #a855f7;
            --accent-glow: rgba(168,85,247,0.25);
            --accent-dim: rgba(168,85,247,0.12);
            --accent-border: rgba(168,85,247,0.3);
            --bg: #0d0d10;
            --chrome: #0d0d10;
            --chrome-border: rgba(255,255,255,0.07);
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.09);
            --glass-hover: rgba(255,255,255,0.07);
            --text: #fff;
            --text-dim: rgba(255,255,255,0.55);
            --text-muted: rgba(255,255,255,0.28);
            --hover: rgba(255,255,255,0.07);
            --tile-size: 76px;
            --tile-gap: 18px;
            --card-radius: 18px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(168,85,247,0.13) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 20% 100%, rgba(99,102,241,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 35% 25% at 80% 80%, rgba(168,85,247,0.05) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
            animation: ambientShift 12s ease-in-out infinite alternate;
        }
        @keyframes ambientShift {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }

        /* ── Main Content ─────────────────────────────────────────── */
        .content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%; max-width: 820px;
            height: 100vh;
            padding: 40px 32px;
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Clock ────────────────────────────────────────────────── */
        .clock-block {
            text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 14px;
        }

        .clock {
            font-size: 96px;
            font-weight: 200;
            letter-spacing: -7px;
            line-height: 1;
            color: #fff;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 40px rgba(168,85,247,0.18), 0 0 80px rgba(168,85,247,0.08);
        }

        .clock-colon {
            animation: blink 1s step-start infinite;
            display: inline-block;
            opacity: 0.7;
        }
        @keyframes blink { 50% { opacity: 0.15; } }

        .meta-row {
            display: flex; align-items: center; gap: 10px;
            font-size: 10.5px; font-weight: 600;
            letter-spacing: 3.5px; text-transform: uppercase;
            color: var(--text-muted);
        }
        .meta-dot {
            width: 4px; height: 4px; border-radius: 50%;
            background: var(--accent);
            animation: pulseDot 2.5s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%, 100% { box-shadow: 0 0 6px var(--accent); transform: scale(1); }
            50% { box-shadow: 0 0 14px var(--accent); transform: scale(1.5); }
        }

        /* ── Search Bar ───────────────────────────────────────────── */
        .search-wrap { width: 100%; }

        .search-bar {
            display: flex; align-items: center; gap: 12px;
            width: 100%; height: 54px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 14px;
            padding: 0 18px;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 4px 24px rgba(0,0,0,0.22);
        }
        .search-bar:focus-within {
            background: rgba(255,255,255,0.07);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(168,85,247,0.15), inset 0 1px 0 rgba(168,85,247,0.05), 0 8px 32px rgba(0,0,0,0.3);
        }
        .search-bar .search-icon {
            font-size: 14px;
            color: var(--text-muted);
            transition: color 0.25s, transform 0.25s;
            flex-shrink: 0;
        }
        .search-bar:focus-within .search-icon {
            color: var(--accent);
            transform: scale(1.12);
        }
        .search-input {
            flex: 1; background: none; border: none; outline: none;
            font-size: 15px; font-family: 'Inter', sans-serif; font-weight: 400;
            color: #fff; letter-spacing: 0.1px;
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-enter-hint {
            font-size: 10px; font-weight: 700;
            color: var(--text-muted); letter-spacing: 0.5px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            padding: 4px 9px; border-radius: 7px;
            opacity: 0; transition: opacity 0.2s;
            flex-shrink: 0; white-space: nowrap;
        }
        .search-bar:focus-within .search-enter-hint { opacity: 1; }

        /* ── Quick Launch Shelf ───────────────────────────────────── */
        .shelf {
            display: flex; gap: var(--tile-gap);
            justify-content: center; flex-wrap: wrap;
            width: 100%;
        }

        .tile {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .tile-icon {
            width: var(--tile-size); height: var(--tile-size);
            border-radius: var(--card-radius);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            color: var(--text-dim);
            transition: inherit;
            position: relative; overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .tile-icon::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 55%);
        }
        .tile-label {
            font-size: 11.5px; font-weight: 500;
            color: var(--text-muted); letter-spacing: 0.2px;
            transition: color 0.25s;
            max-width: var(--tile-size);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-align: center;
        }
        .tile:hover .tile-icon {
            transform: translateY(-8px) scale(1.04);
            box-shadow: 0 24px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.09);
        }
        .tile:hover .tile-label { color: var(--text-dim); }

        /* ── Hover Transitions ────────────────────────────────────────── */
        .tile:hover .tile-icon {
            transform: translateY(-8px) scale(1.04);
            box-shadow: 0 24px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.25) !important;
            background: rgba(255,255,255,0.12) !important;
            color: #fff !important;
            filter: brightness(1.2) grayscale(1);
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        .tile:hover .tile-label { color: #fff; font-weight: 600; }

        /* ── Layout Variants & Premium Styles ─────────────────────────────────── */
        .content.layout-top    { justify-content: flex-start; padding-top: 80px; }
        .content.layout-center { justify-content: center; }
        .content.layout-bottom { justify-content: flex-end; padding-bottom: 100px; flex-direction: column-reverse; }
        .content.layout-bottom .clock-block { order: 2; margin-bottom: 30px; }
        .content.layout-bottom .shelf       { order: 1; margin-bottom: 20px; }
        .content.layout-bottom .search-wrap { order: 0; }

        /* Style: Glassmorphic Array (Soft & Airy) */
        .tile.style-glass-array .tile-icon {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(50px) saturate(210%);
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow: 0 16px 48px rgba(0,0,0,0.25), inset 0 2px 0 rgba(255,255,255,0.08);
            border-radius: 28px; /* Soft bubble corners */
        }
        .tile.style-glass-array:hover .tile-icon {
            background: rgba(255,255,255,0.12);
            transform: translateY(-10px) scale(1.08);
        }

        /* Style: Solid Matte Structure (Hard & Industrial) */
        .tile.style-solid-matte .tile-icon {
            width: calc(var(--tile-size) * 1.5);
            height: calc(var(--tile-size) * 0.85);
            background: #111114; /* Deep, opaque stealth matte */
            border: 1.2px solid rgba(255,255,255,0.1);
            border-radius: 6px; /* Sharp industrial corners */
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 2px 0 rgba(0,0,0,1);
            backdrop-filter: none;
            overflow: hidden;
        }
        .tile.style-solid-matte .tile-label { max-width: calc(var(--tile-size) * 1.5); }
        .tile.style-solid-matte .tile-icon::before {
            /* Override the default gloss highlight with a matte subtle top edge */
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 15%);
        }
        .tile.style-solid-matte .tile-icon i { 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); 
            opacity: 0.8;
            color: rgba(255,255,255,0.7);
        }
        .tile.style-solid-matte:hover .tile-icon {
            background: #16161a;
            border-color: rgba(255,255,255,0.22);
            transform: translateY(-6px); /* Less floaty, more solid */
        }
        .tile.style-solid-matte:hover .tile-icon i { opacity: 1; color: #fff; }

        /* Style: Neon Circular Orbit (Futuristic) */
        .tile.style-neon-orbit .tile-icon {
            width: var(--tile-size);
            height: var(--tile-size);
            border-radius: 50%;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.02);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .tile.style-neon-orbit:hover .tile-icon {
            border-color: #fff;
            box-shadow: 0 0 40px rgba(255,255,255,0.2), inset 0 0 20px rgba(255,255,255,0.05);
            transform: scale(1.1) rotate(5deg);
        }
        /* Dashboard Orbit Trace */
        .tile.style-neon-orbit .tile-icon::after {
            content: ''; position: absolute; inset: -4px; border-radius: 50%;
            border: 1px dashed rgba(255,255,255,0.15);
            opacity: 0; transition: opacity 0.4s, transform 0.6s;
            pointer-events: none;
        }
        .tile.style-neon-orbit:hover .tile-icon::after {
            opacity: 0.5; transform: rotate(180deg);
        }

        /* ── Bottom Status Bar ────────────────────────────────────── */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 42px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px;
            background: linear-gradient(0deg, rgba(13,13,16,0.98) 60%, transparent 100%);
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }
        .bottom-action {
            display: flex; align-items: center; gap: 7px;
            padding: 5px 12px; border-radius: 9px;
            background: transparent; border: 1px solid transparent;
            color: var(--text-muted);
            font-size: 11.5px; font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
            letter-spacing: 0.2px;
        }
        .bottom-action i { font-size: 11px; transition: transform 0.2s; }
        .bottom-action:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.09);
            color: #fff; transform: translateY(-1px);
        }
        .bottom-action:hover i { transform: scale(1.15); }
        .bottom-brand {
            font-size: 9px; font-weight: 800;
            letter-spacing: 4px; text-transform: uppercase;
            color: var(--text-muted); opacity: 0.45;
        }

        /* ── Responsive ───────────────────────────────────────────── */
        @media (max-width: 900px) {
            .clock { font-size: 72px; letter-spacing: -5px; }
            :root { --tile-size: 64px; }
        }
        @media (max-height: 650px) {
            .content { gap: 24px; }
            .clock { font-size: 58px; }
        }
    </style>
</head>

<body>
    <div class="content">
        <!-- Clock -->
        <div class="clock-block">
            <div class="clock" id="clock">
                <span id="clock-h">00</span><span class="clock-colon">:</span><span id="clock-m">00</span>
            </div>
            <div class="meta-row">
                <span id="greeting">GOOD MORNING</span>
                <div class="meta-dot"></div>
                <span id="date-display">...</span>
            </div>
        </div>

        <!-- Search -->
        <div class="search-wrap">
            <div class="search-bar">
                <i class="fas fa-magnifying-glass search-icon"></i>
                <input type="text" class="search-input" id="home-search"
                    placeholder="Search or enter an address" autofocus autocomplete="off">
                <span class="search-enter-hint">&#8629; ENTER</span>
            </div>
        </div>

        <!-- Quick Launch Shelf -->
        <div class="shelf" id="shelf">
            <div class="tile" data-url="youtube.com">
                <div class="tile-icon"><i class="fab fa-youtube"></i></div>
                <span class="tile-label">YouTube</span>
            </div>
            <div class="tile" data-url="spotify.com">
                <div class="tile-icon"><i class="fab fa-spotify"></i></div>
                <span class="tile-label">Spotify</span>
            </div>
            <div class="tile" data-url="amazon.com">
                <div class="tile-icon"><i class="fab fa-amazon"></i></div>
                <span class="tile-label">Amazon</span>
            </div>
            <div class="tile" data-url="discord.com">
                <div class="tile-icon"><i class="fab fa-discord"></i></div>
                <span class="tile-label">Discord</span>
            </div>
            <div class="tile" data-url="github.com">
                <div class="tile-icon"><i class="fab fa-github"></i></div>
                <span class="tile-label">GitHub</span>
            </div>
        </div>
    </div>

    <!-- Bottom status-bar -->
    <div class="bottom-bar">
        <div class="bottom-action" id="settings-btn">
            <i class="fas fa-gear"></i> Settings
        </div>
        <div class="bottom-brand">OCAL BROWSER</div>
        <div class="bottom-action" id="history-btn">
            <i class="fas fa-clock-rotate-left"></i> History
        </div>
    </div>

    <script src="home.js"></script>
</body>
</html>
