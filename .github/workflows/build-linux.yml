name: Linux Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'linux-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Native Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot libarchive-tools

      - name: Install Dependencies
        run: npm install

      - name: Build and Publish Linux
        run: npm run build-linux -- --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
