<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com;">
<title>Ocal AI Sidebar</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --accent: #a855f7;
        --accent-glow: rgba(168, 85, 247, 0.4);
        --bg: #0c0c0e;
        --panel-bg: rgba(15, 15, 18, 0.75);
        --border: rgba(255,255,255,0.08);
        --text: #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        background: transparent;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
        font-family: 'Inter', sans-serif;
        display: flex;
    }
    
    /* Resize Handle */
    #resize-handle {
        width: 6px;
        height: 100%;
        cursor: ew-resize;
        background: transparent;
        transition: background 0.2s;
        z-index: 100;
        flex-shrink: 0;
    }
    #resize-handle:hover, #resize-handle.active {
        background: var(--accent-glow);
    }

    .ai-panel {
        flex: 1;
        background: var(--panel-bg);
        backdrop-filter: blur(32px) saturate(180%);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-radius: 0 0 0 20px;
        box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }

    .ai-header {
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .ai-title {
        font-size: 13px;
        font-weight: 700;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .ai-title i { color: var(--accent); }
    
    .ai-btn {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: none;
        background: rgba(255,255,255,0.04);
        color: rgba(255,255,255,0.6);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        transition: all 0.2s;
    }
    .ai-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }

    .ai-content {
        flex: 1;
        position: relative;
        background: #000;
    }
    webview {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>
<body>
    <div id="resize-handle" title="Drag to resize"></div>
    <div class="ai-panel">
        <div class="ai-header">
            <div class="ai-title"><i class="fas fa-sparkles"></i> Gemini AI</div>
            <div style="display:flex; gap:6px;">
                <button class="ai-btn" id="reload-ai" title="Reload"><i class="fas fa-rotate-right"></i></button>
                <button class="ai-btn" id="close-ai" title="Close"><i class="fas fa-xmark"></i></button>
            </div>
        </div>
        <div class="ai-content">
            <webview id="ai-webview" src="https://gemini.google.com" partition="persist:sidebar" useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"></webview>
        </div>
    </div>

    <script src="ai-sidebar.js"></script>
</body>
</html>
