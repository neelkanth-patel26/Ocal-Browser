<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;">
    <title>Ocal AI Assistant</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.5/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --accent: #d946ef; /* Vibrant Fuchsia/Purple */
            --accent-glow: rgba(217, 70, 239, 0.4);
            --chrome: #0d0d10; /* Match Top Bar Exactly */
            --topbar-gradient: linear-gradient(180deg, rgba(255,255,255,0.025) 0%, transparent 100%);
            --border: rgba(255, 255, 255, 0.07);
            --border-heavy: rgba(255, 255, 255, 0.12);
            --text: #fafafa;
            --text-dim: #a1a1aa;
            --text-muted: #52525b;
            --panel-bg: #0d0d10; 
            --card-bg: rgba(24, 24, 27, 0.95);
            --input-bg: rgba(9, 9, 11, 0.9);
            --title-font: 'Outfit', sans-serif;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: transparent;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: var(--font);
            display: flex;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* Resize Handle */
        #resize-handle {
            width: 4px;
            height: 100%;
            cursor: ew-resize;
            background: transparent;
            z-index: 100;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        #resize-handle:hover, #resize-handle.active {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .ai-panel {
            flex: 1;
            background: var(--panel-bg);
            background-image: var(--topbar-gradient);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: -15px 0 35px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            will-change: transform, opacity;
        }

        .ai-panel.animate-in {
            visibility: visible;
            animation: slide-right-in 0.45s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        body.closing .ai-panel {
            visibility: visible;
            animation: slide-right-out 0.35s cubic-bezier(0.19, 1, 0.22, 1) forwards !important;
        }

        @keyframes slide-right-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slide-right-out {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        .ai-header {
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--chrome);
            background-image: var(--topbar-gradient);
            z-index: 10;
        }

        .ai-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ai-logo {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 11px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .ai-title-text h1 {
            font-family: var(--title-font);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ai-controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            font-size: 12px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-heavy);
            color: #fff;
            transform: translateY(-1px);
        }

        .ai-chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            z-index: 10;
            background: transparent;
        }

        .messages-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .messages-scroll::-webkit-scrollbar { width: 5px; }
        .messages-scroll::-webkit-scrollbar-track { background: transparent; }
        .messages-scroll::-webkit-scrollbar-thumb { 
            background: var(--border-heavy); 
            border-radius: 10px; 
        }
        .messages-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .msg-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 90%;
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg-group.user { align-self: flex-end; }
        .msg-group.ai { align-self: flex-start; }

        .msg-bubble {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border);
        }

        .user .msg-bubble {
            background: linear-gradient(135deg, rgba(217, 70, 239, 0.1), rgba(124, 58, 237, 0.05));
            border-color: rgba(217, 70, 239, 0.2);
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .ai .msg-bubble {
            border-bottom-left-radius: 4px;
            color: #efeff1;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* Markdown Styles */
        .msg-content p { margin-bottom: 12px; }
        .msg-content p:last-child { margin-bottom: 0; }
        .msg-content pre {
            background: #000;
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid var(--border-heavy);
        }
        .msg-content code {
            font-family: var(--mono);
            font-size: 12.5px;
        }
        .msg-content :not(pre) > code {
            background: rgba(255,255,255,0.06);
            padding: 2px 6px;
            border-radius: 6px;
            color: var(--accent);
            font-weight: 500;
        }

        /* Agent Actions */
        .agent-action {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 6px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .agent-action i { color: var(--accent); font-size: 11px; filter: drop-shadow(0 0 5px var(--accent-glow)); }
        
        .agent-action.clickable {
            cursor: pointer;
            background: rgba(217, 70, 239, 0.05);
            border-color: rgba(217, 70, 239, 0.1);
        }
        .agent-action.clickable:hover {
            background: var(--accent);
            color: #000;
            transform: translateX(4px);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .agent-action.clickable:hover i { color: #000; filter: none; }

        /* Thinking State */
        .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            width: fit-content;
            border: 1px solid var(--border);
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-ring 1.2s infinite ease-in-out;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 15px var(--accent-glow); }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        /* ── Premium Typography ── */
        .msg-content h1, .msg-content h2, .msg-content h3 {
            font-family: var(--title-font);
            font-size: 16px; margin: 20px 0 12px; color: #fff;
            letter-spacing: -0.3px; font-weight: 700;
        }
        .msg-content h4 {
            font-family: var(--title-font);
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--accent); margin: 18px 0 8px; font-weight: 800;
        }
        .msg-content blockquote {
            border-left: 3px solid var(--accent);
            background: rgba(217, 70, 239, 0.03);
            padding: 14px 20px; border-radius: 4px 14px 14px 4px;
            margin: 16px 0; color: var(--text-dim);
            font-size: 13.5px;
        }
        .msg-content ul, .msg-content ol {
            padding-left: 20px; margin: 12px 0;
            display: flex; flex-direction: column; gap: 8px;
        }
        .msg-content li { font-size: 14px; color: rgba(255, 255, 255, 0.8); }

        /* Input Zone */
        .ai-input-wrapper {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--chrome);
            z-index: 10;
        }

        .quick-tools {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 4px 0;
        }
        .quick-tools::-webkit-scrollbar { display: none; }

        .tool-chip {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: var(--title-font);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-chip:hover {
            background: rgba(217, 70, 239, 0.1);
            border-color: rgba(217, 70, 239, 0.3);
            color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .input-container {
            background: var(--input-bg);
            border: 1px solid var(--border-heavy);
            border-radius: 16px;
            padding: 6px;
            display: flex;
            align-items: flex-end;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .input-container:focus-within {
            border-color: var(--accent);
            background: #0d0d0f;
            box-shadow: 0 0 0 3px rgba(217, 70, 239, 0.1);
        }

        #ai-query {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            padding: 12px 14px;
            font-family: var(--font);
            font-size: 14px;
            resize: none;
            max-height: 160px;
            min-height: 24px;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .send-btn:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 20px var(--accent-glow);
        }

    </style>
</head>
<body>
    <div id="resize-handle"></div>
    <div class="ai-panel">
        <div class="ai-header">
            <div class="ai-brand">
                <div class="ai-logo"><i class="fas fa-bolt"></i></div>
                <div class="ai-title-text">
                    <h1>Ocal Assistant</h1>
                </div>
            </div>
            <div class="ai-controls">
                <button class="control-btn" id="clear-chat" title="Clear Chat"><i class="fas fa-trash-can"></i></button>
                <button class="control-btn" id="close-ai" title="Close"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <div class="ai-chat-view">
            <div id="ai-chat-messages" class="messages-scroll">
                <div class="msg-group ai">
                    <div class="msg-bubble">
                        <div class="msg-content">
                            Hello! I am your <b>Ocal AI</b>. I can summarize complex pages, explain architectures, and help you find exactly what you're looking for.
                        </div>
                    </div>
                </div>
            </div>

            <div class="ai-input-wrapper">
                <div class="quick-tools">
                    <button class="tool-chip" id="tool-summarize"><i class="fas fa-file-lines"></i> Summarize</button>
                    <button class="tool-chip" id="tool-email"><i class="fas fa-paper-plane"></i> Compose Email</button>
                </div>
                <div class="input-container">
                    <textarea id="ai-query" placeholder="How can I assist you?" rows="1"></textarea>
                    <button id="ai-send" class="send-btn"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="ai-sidebar.js"></script>
</body>
</html>
</html>
