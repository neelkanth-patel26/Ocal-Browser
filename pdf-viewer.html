<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://cdnjs.cloudflare.com https://unpkg.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https: https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com; frame-src 'self' https://docs.google.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocal Documents</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #000000;
            --accent: #ffffff;
            --accent-glow: transparent;
            --accent-dim: #111111;
            --text: #ffffff;
            --text-dim: #a3a3a3;
            --border: #171717;
            --toolbar-bg: #000000;
            --toolbar-border: #171717;
            --btn-hover: #111111;
            --sidebar-w: 240px;
            --panel-blur: none;
        }

        [data-theme="sepia"] { 
            --bg: #f4ecd8; 
            --surface: #e6dfcf; 
            --text: #433422; 
            --text-dim: #5f4b32; 
            --border: #dcd3bc; 
            --toolbar-bg: #e6dfcf;
            --toolbar-border: #dcd3bc;
            --btn-hover: #dbd2ba;
        }

        [data-theme="light"] { 
            --bg: #ffffff; 
            --surface: #f7f7f7; 
            --text: #000000; 
            --text-dim: #111111; 
            --border: #eeeeee; 
            --toolbar-bg: #f7f7f7;
            --toolbar-border: #eeeeee;
            --btn-hover: #eeeeee;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0px !important; }
        body { 
            font-family: 'Geist Mono', monospace; 
            background: var(--bg); 
            color: var(--text);
            height: 100vh; overflow: hidden;
            display: flex; transition: background 0.2s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--surface);
            backdrop-filter: var(--panel-blur);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
            z-index: 1000;
        }
        #sidebar.collapsed { 
            transform: translateX(calc(-1 * var(--sidebar-w)));
            opacity: 0;
            position: absolute;
            pointer-events: none;
        }
        
        .sidebar-header {
            padding: 24px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }
        .sidebar-title { 
            font-family: 'Geist Mono'; font-weight: 800; font-size: 10px; 
            letter-spacing: 1.5px; text-transform: uppercase;
            display: flex; align-items: center; gap: 8px;
            color: var(--text);
        }

        #thumbnails {
            flex: 1; overflow-y: auto; padding: 12px;
            display: grid; grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: min-content;
            gap: 12px;
            scrollbar-width: none;
        }
        #thumbnails::-webkit-scrollbar { display: none; }
        
        .thumb-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .thumb {
            width: 100%; border-radius: 0px !important; cursor: pointer;
            border: 1px solid var(--border); transition: all 0.15s;
            overflow: hidden; aspect-ratio: 1 / 1.414;
            background: #000; 
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .thumb:hover { 
            border-color: var(--text); 
            background: #111;
        }
        .thumb.active { 
            border: 2px solid var(--text); 
            box-shadow: none !important;
        }
        .thumb.active::after {
            content: ''; position: absolute; inset: 0;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 0px !important;
        }
        .thumb canvas { width: 100%; height: 100%; object-fit: cover; }
        .thumb-num { 
            font-size: 9px; font-weight: 700; font-family: 'Geist Mono'; 
            color: var(--text-muted); text-transform: uppercase;
        }

        /* ── Viewport ── */
        main {
            flex: 1; height: 100vh; 
            position: relative; display: flex; flex-direction: column;
            overflow: hidden;
        }

        #viewport {
            flex: 1; overflow: auto;
            position: relative; padding: 80px 0 40px;
            display: flex; flex-direction: column; align-items: center;
            gap: 24px;
            background: var(--bg);
        }

        #page-container-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 24px;
            width: 100%;
        }
        
        .page-wrapper {
            position: relative;
            box-shadow: none !important;
            background: #fff; border-radius: 0px !important;
            border: 1px solid var(--border);
        }
        .page-wrapper canvas { display: block; max-width: 100%; }
        
        /* ── Floating Toolbar ── */
        .toolbar-anchor {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 200; pointer-events: none;
        }

        .toolbar {
            pointer-events: auto;
            background: var(--toolbar-bg);
            border: 1px solid var(--toolbar-border);
            padding: 4px; border-radius: 0px;
            display: flex; align-items: center; gap: 2px;
        }

        @keyframes toolbarSlideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .tool-group { display: flex; align-items: center; gap: 2px; padding: 0 4px; }
        .tool-sep { width: 1px; height: 20px; background: var(--border); margin: 0 6px; opacity: 0.5; }

        .btn {
            background: transparent; border: 1px solid transparent;
            color: var(--text-dim); width: 34px; height: 34px; border-radius: 0px !important;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.1s; font-size: 12px;
            font-family: 'Geist Mono', monospace;
        }
        .btn:hover { background: var(--btn-hover); color: var(--text); border-color: var(--border); }
        .btn.active { 
            background: var(--text); color: var(--bg); 
            border-color: var(--text);
        }
        .btn.primary { 
            background: var(--accent); color: #000000 !important;
            width: auto; padding: 0 12px; gap: 6px; font-weight: 800; font-size: 10px;
            text-transform: uppercase; letter-spacing: 0.5px;
            border: 1px solid var(--accent);
        }
        .btn.primary:hover {
            background: #ffffff; color: #000000 !important;
            filter: brightness(0.9);
        }

        /* Color Picker */
        .color-well {
            width: 20px; height: 20px; border-radius: 50%;
            border: 1.5px solid #fff;
            cursor: pointer; transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .color-well:hover { transform: scale(1.1); }
        
        .page-num-jump {
            background: #000; border: 1px solid var(--border);
            border-radius: 0px !important; padding: 0 8px; height: 34px;
            display: flex; align-items: center; gap: 4px;
            font-size: 11px; font-weight: 700; color: var(--text-dim);
        }
        .page-num-jump input {
            background: transparent; border: none; color: var(--text);
            width: 28px; text-align: center; font-weight: 800; font-family: 'Geist Mono';
            outline: none; font-size: 12px;
        }

        .zoom-label { 
            font-size: 10px; font-weight: 800; min-width: 44px; 
            text-align: center; color: var(--text); font-family: 'Geist Mono';
        }

        /* ── Sidebar Toggle Button ── */
        .sidebar-toggle { 
            position: absolute; top: 20px; left: 20px; z-index: 250; 
            background: var(--bg);
            border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 0px !important;
            transition: all 0.15s;
        }
        .sidebar-toggle:hover { 
            background: var(--text); color: var(--bg); 
            box-shadow: none !important;
        }

        /* Chroma Card */
        #chroma-card {
            display: none; position: fixed; z-index: 1000; top: 70px; left: 50%; 
            transform: translateX(-50%); background: var(--bg);
            border: 1px solid var(--border); border-radius: 0px !important; 
            padding: 16px; width: 220px; 
            box-shadow: none !important; 
            animation: chromaPop 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes chromaPop {
            from { opacity: 0; transform: translate(-50%, -10px) scale(0.98); }
            to { opacity: 1; transform: translate(-50%, 0) scale(1); }
        }

        #search-input {
            background: #000; border: 1px solid var(--border); 
            border-radius: 0px !important; padding: 6px 10px; 
            color: var(--text); font-size: 11px; outline: none; width: 100px; 
            transition: all 0.15s; font-family: 'Geist Mono';
        }
        #search-input:focus { border-color: var(--accent); width: 140px; }

        @media print {
            .toolbar-anchor, #sidebar, .sidebar-toggle, #chroma-card, #floating-input-overlay, .sidebar-header, .sidebar-title {
                display: none !important;
            }
            body, main, #viewport { 
                background: white !important;
                color: black !important;
                height: auto !important;
                overflow: visible !important;
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            #viewport { position: static !important; }
            .page-wrapper {
                box-shadow: none !important;
                border: 1px solid #eee !important;
                page-break-after: always;
                margin: 0 0 10px 0 !important;
            }
            canvas { max-width: 100% !important; height: auto !important; }
        }
    </style>
</head>
<body data-theme="dark">

    <div id="fallback-viewport"></div>
    
    <!-- Collapsible Sidebar -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">
                <i class="fas fa-file-pdf" style="color:var(--accent);"></i>
                <span>Navigator</span>
            </div>
            <button class="btn" id="hide-sidebar" title="Hide Navigation"><i class="fas fa-xmark"></i></button>
        </div>
        <div id="thumbnails"></div>
    </aside>

    <main>
        <button class="btn sidebar-toggle" id="show-sidebar" title="Open Navigation">
            <i class="fas fa-bars"></i>
        </button>

        <div class="toolbar-anchor">
            <div class="toolbar">
                <!-- Nav -->
                <div class="tool-group">
                    <button class="btn" id="prev-btn" title="Previous Page"><i class="fas fa-chevron-up"></i></button>
                    <div class="page-num-jump">
                        <input type="text" id="page-num" value="1">
                        <span style="opacity:0.3;">/</span>
                        <span id="page-count">0</span>
                    </div>
                    <button class="btn" id="next-btn" title="Next Page"><i class="fas fa-chevron-down"></i></button>
                </div>
                
                <div class="tool-sep"></div>

                <!-- Annotate -->
                <div class="tool-group">
                    <button class="btn active" id="tool-hand" title="Pan"><i class="fas fa-hand"></i></button>
                    <button class="btn" id="tool-pen" title="Draw"><i class="fas fa-pen"></i></button>
                    <button class="btn" id="tool-highlight" title="Highlight"><i class="fas fa-highlighter"></i></button>
                    <button class="btn" id="tool-text" title="Text"><i class="fas fa-font"></i></button>
                    <button class="btn" id="tool-eraser" title="Eraser"><i class="fas fa-eraser"></i></button>
                    <div class="color-well" id="color-well-btn" title="Color"></div>
                </div>

                <div class="tool-sep"></div>

                <!-- View -->
                <div class="tool-group">
                    <button class="btn" id="zoom-out"><i class="fas fa-minus"></i></button>
                    <div class="zoom-label" id="zoom-val">100%</div>
                    <button class="btn" id="zoom-in"><i class="fas fa-plus"></i></button>
                    <button class="btn" id="rotate-btn" title="Rotate"><i class="fas fa-rotate"></i></button>
                </div>

                <div class="tool-sep"></div>

                <!-- Search -->
                <div class="tool-group">
                    <button class="btn" id="tool-search" title="Search"><i class="fas fa-magnifying-glass"></i></button>
                    <div id="search-box" style="display:none; align-items:center; gap:4px; margin-left:8px;">
                        <input type="text" id="search-input" placeholder="Search...">
                        <button class="btn" id="search-prev" style="width:24px; height:24px; font-size:10px;"><i class="fas fa-chevron-up"></i></button>
                        <button class="btn" id="search-next" style="width:24px; height:24px; font-size:10px;"><i class="fas fa-chevron-down"></i></button>
                        <span id="search-count" style="font-size:10px; font-weight:700; color:var(--text-dim); font-family:'Geist Mono'; margin-left:4px; min-width:24px; opacity:0.6;">0/0</span>
                    </div>
                </div>

                <div class="tool-sep"></div>

                <!-- Theme, Print & Download -->
                <div class="tool-group">
                    <button class="btn" id="theme-btn" title="Theme"><i class="fas fa-circle-half-stroke"></i></button>
                    <button class="btn" id="print-btn" title="Print"><i class="fas fa-print"></i></button>
                    <button class="btn primary" id="download-btn" title="Save">
                        <i class="fas fa-download"></i>
                        <span>Save</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="chroma-card">
            <div style="font-family:'Geist Mono'; font-weight:800; font-size:9px; color:var(--text-dim); margin-bottom:12px; letter-spacing:1px; text-transform:uppercase;">Palette</div>
            <div id="chroma-grid" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; margin-bottom:16px;"></div>
            <div style="border-top:1px solid var(--border); padding-top:12px;">
                <input type="text" id="chroma-hex" placeholder="#HEX" style="background:transparent; border:none; color:var(--text); font-family:'Geist Mono'; font-weight:700; font-size:12px; outline:none; width:100%;">
            </div>
        </div>

        <div id="viewport">
            <div id="page-container-wrapper"></div>
        </div>

        <!-- Floating Text Interface -->
        <div id="floating-input-overlay" style="display:none; position:fixed; z-index:1000; pointer-events:auto;">
            <input type="text" id="floating-text-input" placeholder="Type a note..." 
                   style="background:#000; color:#fff; border:1px solid #fff; border-radius:0px !important; padding:12px 20px; font-family:'Geist Mono'; font-size:13px; font-weight:600; outline:none; box-shadow:none; min-width:220px; transition:all 0.2s;">
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="pdf-viewer.js"></script>
</body>
</html>
