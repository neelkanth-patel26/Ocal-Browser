<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://cdnjs.cloudflare.com https://unpkg.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https: https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com; frame-src 'self' https://docs.google.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocal Documents</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: rgba(18, 18, 23, 0.45);
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.45);
            --accent-dim: rgba(168, 85, 247, 0.12);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.65);
            --border: rgba(255, 255, 255, 0.08);
            --toolbar-bg: rgba(22, 22, 28, 0.6);
            --toolbar-border: rgba(255, 255, 255, 0.1);
            --btn-hover: rgba(255, 255, 255, 0.08);
            --sidebar-w: 240px;
            --panel-blur: blur(40px) saturate(210%);
        }

        [data-theme="sepia"] { 
            --bg: #f4ecd8; 
            --surface: rgba(234, 224, 201, 0.6); 
            --text: #433422; 
            --text-dim: #5f4b32; 
            --border: rgba(67, 52, 34, 0.1); 
            --toolbar-bg: rgba(234, 224, 201, 0.7);
            --toolbar-border: rgba(67, 52, 34, 0.12);
            --btn-hover: rgba(67, 52, 34, 0.05);
        }

        [data-theme="light"] { 
            --bg: #ffffff; 
            --surface: rgba(255, 255, 255, 0.6); 
            --text: #000000; 
            --text-dim: #111111; 
            --border: rgba(0, 0, 0, 0.08); 
            --toolbar-bg: rgba(255, 255, 255, 0.75);
            --toolbar-border: rgba(0, 0, 0, 0.06);
            --btn-hover: rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            height: 100vh; overflow: hidden;
            display: flex; transition: background 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--surface);
            backdrop-filter: var(--panel-blur);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
            z-index: 1000;
        }
        #sidebar.collapsed { 
            transform: translateX(calc(-1 * var(--sidebar-w)));
            opacity: 0;
            position: absolute;
            pointer-events: none;
        }
        
        .sidebar-header {
            padding: 32px 20px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }
        .sidebar-title { 
            font-family: 'Outfit'; font-weight: 800; font-size: 11px; 
            letter-spacing: 2px; text-transform: uppercase;
            display: flex; align-items: center; gap: 10px;
            color: var(--accent);
        }

        #thumbnails {
            flex: 1; overflow-y: auto; padding: 12px;
            display: grid; grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: min-content;
            gap: 12px;
            scrollbar-width: none;
        }
        #thumbnails::-webkit-scrollbar { display: none; }
        
        .thumb-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .thumb {
            width: 100%; border-radius: 6px; cursor: pointer;
            border: 1px solid var(--border); transition: all 0.2s ease;
            overflow: hidden; aspect-ratio: 1 / 1.414;
            background: rgba(255,255,255,0.03); 
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .thumb:hover { 
            border-color: var(--accent); 
            background: rgba(255,255,255,0.06);
            transform: translateY(-1px);
        }
        .thumb.active { 
            border: 1.5px solid var(--accent); 
            box-shadow: 0 4px 12px var(--accent-dim);
        }
        .thumb.active::after {
            content: ''; position: absolute; inset: 0;
            border: 1px solid var(--accent-glow); border-radius: 4px;
        }
        .thumb canvas { width: 100%; height: 100%; object-fit: cover; }
        .thumb-num { 
            font-size: 10px; font-weight: 700; font-family: 'Outfit'; 
            color: var(--text-dim); opacity: 0.6;
        }

        /* ── Viewport ── */
        main {
            flex: 1; height: 100vh; 
            position: relative; display: flex; flex-direction: column;
            overflow: hidden;
        }

        #viewport {
            flex: 1; overflow: auto;
            position: relative; padding: 80px 0 40px;
            display: flex; flex-direction: column; align-items: center;
            gap: 24px;
            background: var(--bg);
        }

        #page-container-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 24px;
            width: 100%;
        }
        
        .page-wrapper {
            position: relative;
            box-shadow: 0 30px 80px rgba(0,0,0,0.2);
            background: #fff; border-radius: 4px;
        }
        .page-wrapper canvas { display: block; max-width: 100%; }
        
        /* ── Floating Toolbar ── */
        .toolbar-anchor {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 200; pointer-events: none;
        }

        .toolbar {
            pointer-events: auto;
            background: var(--toolbar-bg);
            backdrop-filter: var(--panel-blur);
            border: 1px solid var(--toolbar-border);
            padding: 4px; border-radius: 16px;
            display: flex; align-items: center; gap: 2px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            animation: toolbarSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes toolbarSlideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .tool-group { display: flex; align-items: center; gap: 2px; padding: 0 4px; }
        .tool-sep { width: 1px; height: 20px; background: var(--border); margin: 0 6px; opacity: 0.5; }

        .btn {
            background: transparent; border: none;
            color: var(--text-dim); width: 34px; height: 34px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease; font-size: 14px;
        }
        .btn:hover { background: var(--btn-hover); color: var(--text); }
        .btn.active { 
            background: var(--accent-dim); color: var(--accent); 
            box-shadow: inset 0 0 0 1px var(--accent-glow);
        }
        .btn.primary { 
            background: var(--accent); color: #fff;
            width: auto; padding: 0 14px; gap: 8px; font-weight: 600; font-size: 13px;
        }

        /* Color Picker */
        .color-well {
            width: 20px; height: 20px; border-radius: 50%;
            border: 1.5px solid #fff;
            cursor: pointer; transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .color-well:hover { transform: scale(1.1); }
        
        .page-num-jump {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 10px; padding: 0 10px; height: 32px;
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 600; color: var(--text-dim);
        }
        .page-num-jump input {
            background: transparent; border: none; color: var(--text);
            width: 24px; text-align: center; font-weight: 700; font-family: 'Outfit';
            outline: none; font-size: 13px;
        }

        .zoom-label { 
            font-size: 11px; font-weight: 700; min-width: 44px; 
            text-align: center; color: var(--text); font-family: 'Outfit';
        }

        /* ── Sidebar Toggle Button ── */
        .sidebar-toggle { 
            position: absolute; top: 20px; left: 20px; z-index: 250; 
            background: var(--toolbar-bg); backdrop-filter: var(--panel-blur);
            border: 1px solid var(--toolbar-border); color: var(--text);
            width: 40px; height: 40px; border-radius: 14px;
        }
        .sidebar-toggle:hover { 
            background: var(--accent); color: #fff; 
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        /* Chroma Card */
        #chroma-card {
            display: none; position: fixed; z-index: 1000; top: 70px; left: 50%; 
            transform: translateX(-50%); background: var(--toolbar-bg);
            backdrop-filter: var(--panel-blur);
            border: 1px solid var(--toolbar-border); border-radius: 20px; 
            padding: 16px; width: 220px; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.5); 
            animation: chromaPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes chromaPop {
            from { opacity: 0; transform: translate(-50%, -10px) scale(0.95); }
            to { opacity: 1; transform: translate(-50%, 0) scale(1); }
        }

        #search-input {
            background: rgba(255,255,255,0.04); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 4px 10px; 
            color: var(--text); 
            font-size: 12px; 
            outline: none; 
            width: 100px; 
            transition: all 0.2s ease;
        }
        #search-input:focus { border-color: var(--accent); width: 140px; }
    </style>
</head>
<body data-theme="dark">

    <div id="fallback-viewport"></div>
    
    <!-- Collapsible Sidebar -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">
                <i class="fas fa-file-pdf" style="color:var(--accent);"></i>
                <span>Navigator</span>
            </div>
            <button class="btn" id="hide-sidebar" title="Hide Navigation"><i class="fas fa-xmark"></i></button>
        </div>
        <div id="thumbnails"></div>
    </aside>

    <main>
        <button class="btn sidebar-toggle" id="show-sidebar" title="Open Navigation">
            <i class="fas fa-bars"></i>
        </button>

        <div class="toolbar-anchor">
            <div class="toolbar">
                <!-- Nav -->
                <div class="tool-group">
                    <button class="btn" id="prev-btn" title="Previous Page"><i class="fas fa-chevron-up"></i></button>
                    <div class="page-num-jump">
                        <input type="text" id="page-num" value="1">
                        <span style="opacity:0.3;">/</span>
                        <span id="page-count">0</span>
                    </div>
                    <button class="btn" id="next-btn" title="Next Page"><i class="fas fa-chevron-down"></i></button>
                </div>
                
                <div class="tool-sep"></div>

                <!-- Annotate -->
                <div class="tool-group">
                    <button class="btn active" id="tool-hand" title="Pan"><i class="fas fa-hand"></i></button>
                    <button class="btn" id="tool-pen" title="Draw"><i class="fas fa-pen"></i></button>
                    <button class="btn" id="tool-highlight" title="Highlight"><i class="fas fa-highlighter"></i></button>
                    <button class="btn" id="tool-text" title="Text"><i class="fas fa-font"></i></button>
                    <button class="btn" id="tool-eraser" title="Eraser"><i class="fas fa-eraser"></i></button>
                    <div class="color-well" id="color-well-btn" title="Color"></div>
                </div>

                <div class="tool-sep"></div>

                <!-- View -->
                <div class="tool-group">
                    <button class="btn" id="zoom-out"><i class="fas fa-minus"></i></button>
                    <div class="zoom-label" id="zoom-val">100%</div>
                    <button class="btn" id="zoom-in"><i class="fas fa-plus"></i></button>
                    <button class="btn" id="rotate-btn" title="Rotate"><i class="fas fa-rotate"></i></button>
                </div>

                <div class="tool-sep"></div>

                <!-- Search -->
                <div class="tool-group">
                    <button class="btn" id="tool-search" title="Search"><i class="fas fa-magnifying-glass"></i></button>
                    <div id="search-box" style="display:none; align-items:center; gap:4px; margin-left:8px;">
                        <input type="text" id="search-input" placeholder="Search...">
                        <button class="btn" id="search-prev" style="width:24px; height:24px; font-size:10px;"><i class="fas fa-chevron-up"></i></button>
                        <button class="btn" id="search-next" style="width:24px; height:24px; font-size:10px;"><i class="fas fa-chevron-down"></i></button>
                        <span id="search-count" style="font-size:10px; font-weight:700; color:var(--text-dim); font-family:'Outfit'; margin-left:4px; min-width:24px; opacity:0.6;">0/0</span>
                    </div>
                </div>

                <div class="tool-sep"></div>

                <!-- Theme & Download -->
                <div class="tool-group">
                    <button class="btn" id="theme-btn" title="Theme"><i class="fas fa-circle-half-stroke"></i></button>
                    <button class="btn primary" id="download-btn" title="Save">
                        <i class="fas fa-download"></i>
                        <span>Save</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Chroma Card -->
        <div id="chroma-card">
            <div style="font-family:'Outfit'; font-weight:700; font-size:10px; color:var(--text-dim); margin-bottom:12px; letter-spacing:1px; text-transform:uppercase;">Palette</div>
            <div id="chroma-grid" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; margin-bottom:16px;"></div>
            <div style="border-top:1px solid var(--border); padding-top:12px;">
                <input type="text" id="chroma-hex" placeholder="#HEX" style="background:transparent; border:none; color:var(--text); font-family:'Outfit'; font-weight:700; font-size:13px; outline:none; width:100%;">
            </div>
        </div>

        <div id="viewport">
            <div id="page-container-wrapper"></div>
        </div>

        <!-- Floating Text Interface -->
        <div id="floating-input-overlay" style="display:none; position:fixed; z-index:1000; pointer-events:auto;">
            <input type="text" id="floating-text-input" placeholder="Type a note..." 
                   style="background:rgba(22,22,28,0.9); backdrop-filter:blur(20px); color:#fff; border:1px solid var(--accent); border-radius:16px; padding:12px 20px; font-family:'Inter'; font-size:14px; font-weight:500; outline:none; box-shadow:0 30px 60px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow); min-width:220px; transition:all 0.3s;">
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="pdf-viewer.js"></script>
</body>
</html>
