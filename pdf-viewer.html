<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https: https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com; frame-src 'self' https://docs.google.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocal Documents</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #121217;
            --accent: #a855f7;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --toolbar-bg: rgba(28, 28, 35, 0.7);
            --toolbar-border: rgba(255, 255, 255, 0.1);
            --btn-hover: rgba(255, 255, 255, 0.08);
            --sidebar-w: 260px;
        }

        [data-theme="sepia"] { 
            --bg: #f4ecd8; 
            --surface: #eae0c9; 
            --text: #433422; 
            --text-dim: #5f4b32; 
            --border: rgba(67, 52, 34, 0.1); 
            --toolbar-bg: rgba(234, 224, 201, 0.85);
            --toolbar-border: rgba(67, 52, 34, 0.15);
            --btn-hover: rgba(67, 52, 34, 0.05);
        }

        [data-theme="light"] { 
            --bg: #ffffff; 
            --surface: #f4f4f7; 
            --text: #1a1a1e; 
            --text-dim: #6b7280; 
            --border: rgba(0, 0, 0, 0.08); 
            --toolbar-bg: rgba(255, 255, 255, 0.8);
            --toolbar-border: rgba(0, 0, 0, 0.1);
            --btn-hover: rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            height: 100vh; overflow: hidden;
            display: flex; transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── Sidebar ── */
        #sidebar {
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: transform 0.3s ease, margin-left 0.3s ease;
            z-index: 150;
        }
        #sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-w)); }
        
        .sidebar-header {
            padding: 24px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .sidebar-title { font-family: 'Outfit'; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }

        #thumbnails {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .thumb {
            width: 100%; border-radius: 12px; cursor: pointer;
            border: 2px solid transparent; transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
            overflow: hidden; aspect-ratio: 1 / 1.4;
            background: rgba(128,128,128,0.05); display: flex; align-items: center; justify-content: center;
        }
        .thumb:hover { border-color: rgba(168,85,247,0.3); transform: scale(1.02); }
        .thumb.active { border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .thumb canvas { width: 100%; height: 100%; object-fit: cover; }
        .thumb-num { font-size: 11px; font-weight: 700; margin-top: 6px; text-align: center; color: var(--text-dim); }

        /* ── Viewport ── */
        main {
            flex: 1; height: 100vh; 
            position: relative; display: flex; flex-direction: column;
            overflow: hidden;
        }

        #viewport {
            flex: 1; overflow: auto;
            position: relative; padding: 100px 0;
            display: flex; flex-direction: column; align-items: center;
            gap: 40px; scroll-behavior: smooth;
        }

        #page-container-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 30px;
            width: 100%;
        }
        
        .page-wrapper {
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            background: #fff; border-radius: 4px;
            overflow: hidden;
        }
        .page-wrapper canvas { display: block; max-width: 100%; }
        
        /* ── Floating Toolbar ── */
        .toolbar-anchor {
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
            z-index: 200; pointer-events: none;
        }

        .toolbar {
            pointer-events: auto;
            background: var(--toolbar-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--toolbar-border);
            padding: 10px 16px; border-radius: 20px;
            display: flex; align-items: center; gap: 4px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            animation: slideInDown 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .tool-group { display: flex; align-items: center; gap: 4px; padding: 0 4px; }
        .tool-sep { width: 1px; height: 18px; background: var(--border); margin: 0 8px; opacity: 0.5; }

        .btn {
            background: transparent; border: none;
            color: var(--text); width: 38px; height: 38px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-size: 15px;
        }
        .btn:hover { background: var(--btn-hover); transform: translateY(-2px); }
        .btn.active { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(168,85,247,0.3); }
        .btn.primary { background: var(--accent); color: #fff; font-weight: 600; }

        /* Color Picker */
        .color-well {
            width: 24px; height: 24px; border-radius: 50%;
            border: 2.5px solid var(--toolbar-border);
            cursor: pointer; position: relative;
            overflow: hidden; transition: transform 0.2s;
        }
        .color-well:hover { transform: scale(1.1); }
        .color-well input {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            cursor: pointer; padding: 0; border: none; background: none;
        }
        
        .page-num-jump {
            background: var(--btn-hover); border: 1px solid var(--border);
            border-radius: 10px; padding: 0 10px; height: 34px;
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 700; color: var(--text-dim);
        }
        .page-num-jump input {
            background: transparent; border: none; color: var(--text);
            width: 28px; text-align: center; font-weight: 800; font-family: 'Outfit';
            outline: none;
        }

        .zoom-label { font-size: 11px; font-weight: 800; min-width: 44px; text-align: center; color: var(--text); }

        /* ── Sidebar Toggle Button ── */
        .sidebar-toggle { 
            position: absolute; top: 24px; left: 24px; z-index: 250; 
            background: var(--toolbar-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--toolbar-border); color: var(--text);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 44px; height: 44px; border-radius: 15px;
        }
        .sidebar-toggle:hover { background: var(--accent); color: #fff; scale: 1.05; }

        /* Document Title Overlay */
        .doc-title-pill {
            position: fixed; top: 92px; left: 50%; transform: translateX(-50%);
            background: var(--toolbar-bg); backdrop-filter: blur(10px);
            padding: 8px 18px; border-radius: 14px; border: 1px solid var(--toolbar-border);
            font-size: 13px; font-weight: 600; color: var(--text);
            letter-spacing: 0.3px; opacity: 0;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        body:hover .doc-title-pill { opacity: 1; transform: translateX(-50%) translateY(-2px); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.25); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; gap: 24px;
        }
        .spinner { width: 44px; height: 44px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideInDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        #fallback-viewport {
            display: none; width: 100%; height: 100vh; background: #000;
        }
        #fallback-viewport iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body data-theme="dark">
    <div id="fallback-viewport"></div>
    <div id="loader">
        <div class="spinner"></div>
        <div style="font-family: 'Outfit'; font-weight: 700; font-size: 12px; color: var(--text-dim); letter-spacing: 2px;">PREPARING OCAL DOCUMENTS</div>
    </div>

    <!-- Collapsible Sidebar -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title" style="display:flex; align-items:center; gap:10px;">
                <i class="fas fa-file-pdf" style="color:var(--accent); font-size:18px;"></i>
                OCAL DOCS
            </div>
            <button class="btn" id="hide-sidebar" style="background:var(--btn-hover); border-radius:8px;"><i class="fas fa-arrow-left"></i></button>
        </div>
        <div id="thumbnails"></div>
    </aside>

    <main>
        <button class="btn sidebar-toggle" id="show-sidebar" title="Open Navigation">
            <i class="fas fa-bars-staggered"></i>
        </button>

        <div class="toolbar-anchor">
            <div class="toolbar">
                <div class="tool-group">
                    <button class="btn" id="prev-btn"><i class="fas fa-chevron-up"></i></button>
                    <div class="page-num-jump">
                        <input type="text" id="page-num" value="1">
                        <span>/</span>
                        <span id="page-count">-</span>
                    </div>
                    <button class="btn" id="next-btn"><i class="fas fa-chevron-down"></i></button>
                </div>
                
                <div class="tool-sep"></div>

                <div class="tool-group">
                    <button class="btn" id="tool-search" title="Search"><i class="fas fa-search"></i></button>
                    <div id="search-box" style="display:none; align-items:center; gap:8px;">
                        <input type="text" id="search-input" placeholder="Search..." style="background:var(--btn-hover); border:1px solid var(--border); border-radius:8px; padding:4px 10px; color:var(--text); font-size:12px; outline:none; width:100px;">
                        <span id="search-count" style="font-size:10px; font-weight:700; color:var(--text-dim);">0/0</span>
                    </div>
                </div>

                <div class="tool-sep"></div>
                <div class="tool-group">
                    <div class="color-well" id="color-well-btn" title="Pick Color (Chroma Palette)"></div>
                </div>

                <div class="tool-sep"></div>

                <div class="tool-group">
                    <button class="btn" id="tool-hand" title="Pan"><i class="fas fa-hand"></i></button>
                    <button class="btn" id="tool-pen" title="Pencil (Ink)"><i class="fas fa-pencil"></i></button>
                    <button class="btn" id="tool-marker" title="Freehand Marker"><i class="fas fa-marker"></i></button>
                    <button class="btn" id="tool-highlight" title="Pro Highlighter (Text Only)"><i class="fas fa-highlighter"></i></button>
                    <button class="btn" id="tool-text" title="Add Text"><i class="fas fa-font"></i></button>
                    <button class="btn" id="tool-eraser" title="Eraser"><i class="fas fa-eraser"></i></button>
                </div>

                <div class="tool-sep"></div>

                <div class="tool-group">
                    <button class="btn" id="zoom-out"><i class="fas fa-minus"></i></button>
                    <div class="zoom-label" id="zoom-val">100%</div>
                    <button class="btn" id="zoom-in"><i class="fas fa-plus"></i></button>
                </div>

                <div class="tool-sep"></div>

                <div class="tool-group">
                    <button class="btn" id="rotate-btn" title="Rotate Document"><i class="fas fa-rotate"></i></button>
                    <button class="btn" id="theme-btn" title="Switch Theme"><i class="fas fa-circle-half-stroke"></i></button>
                    <button class="btn primary" id="download-btn" title="Download"><i class="fas fa-download"></i></button>
                </div>
            </div>
        </div>

        <div class="doc-title-pill" id="doc-title">Document Loading...</div>

        <!-- Ocal Chroma Palette Overlay -->
        <div id="chroma-card" style="display:none; position:fixed; z-index:1000; top:80px; left:50%; transform:translateX(-50%); background:rgba(18,18,23,0.95); backdrop-filter:blur(25px); border:1.5px solid var(--accent); border-radius:24px; padding:20px; width:220px; box-shadow:0 30px 60px rgba(0,0,0,0.5), 0 0 30px rgba(168,85,247,0.25); animation: slideInDown 0.3s cubic-bezier(0.4, 0, 0.2, 1);">
            <div style="font-family:'Outfit'; font-weight:700; font-size:11px; color:var(--text-dim); margin-bottom:14px; letter-spacing:1px; text-transform:uppercase; text-align:center;">Chroma Presets</div>
            <div id="chroma-grid" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin-bottom:18px;">
                <!-- Curated Presets: Purple, Emerald, Rosewood, etc. -->
            </div>
            <div style="border-top:1px solid var(--border); padding-top:16px; display:flex; align-items:center; gap:10px;">
                <i class="fas fa-hashtag" style="font-size:11px; color:var(--text-dim);"></i>
                <input type="text" id="chroma-hex" placeholder="A855F7" style="background:transparent; border:none; color:#fff; font-family:'Outfit'; font-weight:700; font-size:14px; outline:none; width:100%;">
            </div>
        </div>

        <div id="viewport">
            <div id="page-container-wrapper"></div>
        </div>

        <!-- Floating Text Tool Overlay -->
        <div id="floating-input-overlay" style="display:none; position:fixed; z-index:1000; pointer-events:auto;">
            <input type="text" id="floating-text-input" placeholder="Add a note..." 
                   style="background:rgba(18,18,23,0.95); backdrop-filter:blur(15px); color:#fff; border:1.5px solid var(--accent); border-radius:12px; padding:10px 16px; font-family:'Outfit'; font-size:15px; outline:none; box-shadow:0 15px 40px rgba(0,0,0,0.4), 0 0 20px rgba(168,85,247,0.25); min-width:180px;">
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="pdf-viewer.js"></script>
</body>
</html>
