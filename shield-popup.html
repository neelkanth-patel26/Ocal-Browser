<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocal Shield</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/fonts/geist-fonts.css">
    <style>
        @import url('./assets/fonts/geist-fonts.css');

        :root {
            --accent: #09f0a0;
            --accent-glow: rgba(9, 240, 160, 0.25);
            --accent-dim: rgba(9, 240, 160, 0.12);
            --bg-glass: rgba(12, 12, 12, 0.95);
            --border-glass: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.04);
            --card-hover-bg: rgba(255, 255, 255, 0.04);
            --card-hover-border: var(--accent);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --radius: 12px;
            --font-main: 'Geist Mono', monospace;
            --font-title: 'Geist', sans-serif;
        }

        body[data-theme="light"] {
            --bg-glass: rgba(255, 255, 255, 0.95);
            --border-glass: rgba(0, 0, 0, 0.08);
            --card-bg: rgba(0, 0, 0, 0.02);
            --card-border: rgba(0, 0, 0, 0.04);
            --card-hover-bg: rgba(0, 0, 0, 0.03);
            --card-hover-border: var(--accent);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            border-radius: var(--radius);
        }

        body {
            font-family: var(--font-main);
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: var(--text-primary);
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 10px;
        }

        .popup-overlay {
            position: fixed;
            inset: 0;
            background: transparent;
            z-index: 1;
        }

        .shield-card {
            position: relative;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 270px; /* Thinner, more compact layout */
            z-index: 2;
            opacity: 0;
            transform: translateY(-8px) scale(0.98);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            box-shadow: none !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        body[data-theme="light"] .shield-card {
            box-shadow: none !important;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .shield-card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 8px;
            border-radius: 0;
        }

        .header i {
            font-size: 11px;
            color: var(--accent);
        }

        .header h2 {
            font-family: var(--font-title);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: var(--text-primary);
            border-radius: 0;
        }

        /* Highly Compact Dashboard Stats */
        .stats-dashboard {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        body[data-theme="light"] .stats-dashboard {
            background: rgba(0, 0, 0, 0.01);
        }

        .section-label {
            font-size: 7px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-secondary);
            text-transform: uppercase;
            opacity: 0.5;
            border-radius: 0;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0;
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            border-radius: 0;
        }

        .stat-value-big {
            font-family: var(--font-title);
            font-size: 20px;
            font-weight: 300;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label-sub {
            font-size: 8px;
            color: var(--text-secondary);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-divider {
            width: 1px;
            height: 24px;
            background: var(--border-glass);
            border-radius: 0;
        }

        .stat-row-mini {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-glass);
            padding-top: 4px;
            margin-top: 2px;
            border-radius: 0;
        }

        .stat-row-mini span:last-child {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* Toggle items list */
        .toggle-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-radius: 0;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            transition: all 0.2s ease;
        }

        .toggle-item:hover {
            background: var(--card-hover-bg);
            border-color: var(--card-hover-border);
        }

        .toggle-info {
            border-radius: 0;
            min-width: 0;
        }

        .toggle-title {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 0;
        }

        .toggle-desc {
            display: block;
            font-size: 8px;
            color: var(--text-secondary);
            margin-top: 1px;
            border-radius: 0;
            opacity: 0.7;
        }

        /* Compact Switches */
        .switch {
            position: relative;
            display: inline-block;
            width: 30px;
            height: 16px;
            flex-shrink: 0;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: var(--border-glass);
            transition: 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 100px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 10px;
            width: 10px;
            left: 3px;
            bottom: 3px;
            background: var(--text-primary);
            transition: 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 50%;
        }

        input:checked + .slider {
            background: var(--accent) !important;
            border-radius: 100px !important;
        }

        input:checked + .slider:before {
            transform: translateX(14px);
            background: var(--bg-glass) !important;
        }
    </style>
</head>
<body>
    <div class="popup-overlay" id="popup-overlay"></div>
    <div class="shield-card" id="shield-card">
        <div class="header">
            <i class="fas fa-shield-halved"></i>
            <h2>Ocal Shield</h2>
        </div>

        <!-- Unified Compact Stats Panel -->
        <div class="stats-dashboard">
            <span class="section-label">Impact on this Page</span>
            <div class="stats-row">
                <div class="stat-group">
                    <span class="stat-value-big" id="page-ads">0</span>
                    <span class="stat-label-sub">Ads Blocked</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-group" style="align-items: flex-end;">
                    <span class="stat-value-big" id="page-time">0s</span>
                    <span class="stat-label-sub">Time Saved</span>
                </div>
            </div>
            
            <div class="stat-row-mini">
                <span>Lifetime Blocked:</span>
                <span id="ads-blocked">0</span>
            </div>
            <div class="stat-row-mini" style="border-top: none; padding-top: 0; margin-top: 0;">
                <span>Total Trackers:</span>
                <span id="trackers-blocked">0</span>
            </div>
        </div>

        <div class="toggle-section">
            <div class="toggle-item">
                <div class="toggle-info">
                    <div class="toggle-title">Ad Block</div>
                    <div class="toggle-desc">Remove intrusive ads</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="adblock-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="toggle-item">
                <div class="toggle-info">
                    <div class="toggle-title">Strict Privacy</div>
                    <div class="toggle-desc">Block cross-site tracking</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="privacy-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="toggle-item">
                <div class="toggle-info">
                    <div class="toggle-title">YouTube Dislikes</div>
                    <div class="toggle-desc">Restore dislike counts</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="dislike-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <script src="shield-popup.js"></script>
</body>
</html>
