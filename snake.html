<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:;">
    <title>Ocal Snake | Neon Slither</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="assets/fonts/geist-fonts.css">
    <style>
        :root {
            --accent: #09f0a0;
            --accent-glow: rgba(9, 240, 160, 0.25);
            --accent-dim: rgba(9, 240, 160, 0.15);
            --accent-border: rgba(9, 240, 160, 0.35);
            --bg: #09090b;
            --glass: #18181b;
            --glass-border: #27272a;
            --card-inner-bg: #111113;
            --radius: 12px;
            --text-main: #f4f4f5;
            --text-muted: #71717a;
            --font-title: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-main: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Geist Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        .game-wrapper {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .hud {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .pill {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 8px 20px;
            border-radius: 100px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .val {
            font-family: var(--font-title);
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .canvas-container {
            position: relative;
            background: #050507;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
        }

        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: var(--radius);
        }

        .overlay.active {
            display: flex;
        }

        h2 {
            font-family: var(--font-title);
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
            filter: brightness(1.1);
        }

        .footer-hint {
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 0.5px;
            opacity: 0.8;
            transition: color 0.15s ease;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="hud">
            <div class="pill">
                <span class="label">Score</span>
                <span class="val" id="score">0</span>
            </div>
            <div class="pill">
                <span class="label">Best</span>
                <span class="val" id="best">0</span>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            
            <div class="overlay active" id="startOverlay">
                <h2>OCAL SNAKE</h2>
                <div style="opacity: 0.6; font-size: 13px;">Click below to load game link...</div>
                <button class="btn" id="startBtn">PLAY GAME</button>
            </div>

            <div class="overlay" id="gameOverOverlay">
                <h2 style="color: #ef4444;">GAME OVER</h2>
                <div id="finalScore" style="font-size: 18px; opacity: 0.7; margin-top: 4px;">Score: 0</div>
                <button class="btn" id="restartBtn">RETRY GAME</button>
            </div>
        </div>

        <div class="footer-hint">
            <span>ARROWS / WASD to Move</span>
            <a href="games.html" class="back-link">EXIT TO HUB</a>
        </div>
    </div>

    <script>
        // Apply dynamic accent color
        function applyAccent(color) {
            if (!color) return;
            document.documentElement.style.setProperty('--accent', color);
            
            const hexToRgba = (hex, alpha) => {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                if (!result) return `rgba(9, 240, 160, ${alpha})`;
                const r = parseInt(result[1], 16);
                const g = parseInt(result[2], 16);
                const b = parseInt(result[3], 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            };
            
            document.documentElement.style.setProperty('--accent-glow', hexToRgba(color, 0.25));
            document.documentElement.style.setProperty('--accent-dim', hexToRgba(color, 0.15));
            document.documentElement.style.setProperty('--accent-border', hexToRgba(color, 0.35));
        }

        if (window.electronAPI) {
            window.electronAPI.getSettings().then(s => {
                if (s.accentColor) applyAccent(s.accentColor);
            });
            window.electronAPI.onSettingsChanged((s) => {
                if (s.accentColor) applyAccent(s.accentColor);
            });
        }
    </script>
    <script src="snake.js"></script>
</body>
</html>
