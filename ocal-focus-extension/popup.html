<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocal Focus</title>
    <link href="styles.css" rel="stylesheet">
    <style>
        /* Embed critical modern fonts if needed, though extension popup might inherit or use system fonts */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#purpleGlow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#a855f7" />
                            <stop offset="100%" stop-color="#7e22ce" />
                        </linearGradient>
                    </defs>
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                Ocal Focus
            </div>
        </header>

        <!-- Pomodoro Timer -->
        <div class="timer-section glass-card">
            <div class="timer-display" id="time-display">25:00</div>
            <div class="timer-mode" id="timer-mode">Focus Session</div>
            <div class="timer-controls">
                <button id="start-btn" class="btn btn-primary">Start</button>
                <button id="reset-btn" class="btn btn-secondary">Reset</button>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
        </div>

        <!-- Task Tracker -->
        <div class="tasks-section glass-card">
            <div class="tasks-header">
                <h3>Today's Tasks</h3>
                <span id="task-counter">0/0</span>
            </div>
            <div class="task-input-wrapper">
                <input type="text" id="new-task-input" placeholder="What needs to be done?">
                <button id="add-task-btn" class="btn-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
            <ul id="task-list" class="task-list">
                <!-- Tasks will be injected here -->
            </ul>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
