<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
    <title>Ocal Pulse | Neon Runner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        @import url('https://cdn.jsdelivr.net/fontsource/fonts/geist-sans@latest/latin-400-normal.css');
        @import url('https://cdn.jsdelivr.net/fontsource/fonts/geist-sans@latest/latin-700-normal.css');
        @import url('https://cdn.jsdelivr.net/fontsource/fonts/geist-mono@latest/latin-400-normal.css');
    </style>
    <style>
        :root {
            --accent: #ffffff;
            --accent-glow: transparent;
            --bg: #000000;
            --glass: #000000;
            --glass-border: #171717;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Geist Mono', monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
            border-radius: 0px !important;
        }

        /* Ambient Glow Background */
        .ambient-bg { display: none; }

        .game-wrapper {
            position: relative;
            width: 800px;
            height: 400px;
            border-radius: 0px;
            background: #000;
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* High Fidelity HUD */
        .hud {
            position: absolute;
            top: 24px; left: 24px; right: 24px;
            display: flex; justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .score-pill {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 0px;
            display: flex; align-items: baseline; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #score-val {
            font-family: 'Geist', sans-serif;
            font-size: 24px; font-weight: 800; color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        #best-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
        #best-val { font-family: 'Geist', sans-serif; font-size: 18px; font-weight: 700; color: #fff; opacity: 0.8; }

        .hint {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.3);
            text-transform: uppercase; letter-spacing: 2px;
            display: flex; align-items: center; gap: 10px;
        }
        .key {
            padding: 4px 10px; border-radius: 0px; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1); color: #fff;
        }

        /* Pro Game Over Screen */
        .modal-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; transition: opacity 0.4s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }

        .modal {
            text-align: center;
            background: #000;
            border: 1px solid var(--glass-border);
            padding: 40px 60px;
            border-radius: 0px;
            transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.active .modal { transform: scale(1); }

        h1 { font-family: 'Geist', sans-serif; font-size: 48px; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
        .accent-text { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }

        #final-score { font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.6); margin-bottom: 32px; }

        .btn {
            background: var(--accent);
            color: #000; border: none;
            padding: 16px 40px; border-radius: 0px;
            font-family: 'Geist Mono', monospace; font-size: 18px; font-weight: 800;
            cursor: pointer; transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px var(--accent-glow); filter: brightness(1.1); }
        .btn:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>

    <div class="game-wrapper">
        <div class="hud">
            <div class="score-pill">
                <span id="score-val">0</span>
            </div>
            <div class="score-pill">
                <span id="best-label">Best</span>
                <span id="best-val">0</span>
            </div>
        </div>

        <div class="hint">
            Press <span class="key">SPACE</span> or <span class="key">UP</span> to Pulse
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="modal-overlay" id="gameOverModal">
            <div class="modal">
                <h1>SYSTEM <span class="accent-text">HALTED</span></h1>
                <div id="final-score">Score: 0</div>
                <button class="btn" id="restartBtn">RESTART CORE</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
