<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com;">
<title>Ocal Runner</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            background: #111;
            border: 2px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .ui {
            position: absolute;
            top: 20px;
            text-align: center;
        }
        .score { font-size: 24px; font-weight: bold; color: #a855f7; }
        .hint { font-size: 14px; color: #666; margin-top: 10px; }
        .game-over {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #a855f7;
            backdrop-filter: blur(10px);
        }
        button {
            background: #a855f7;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score" id="score">0</div>
        <div class="hint">Press SPACE or UP to Jump</div>
    </div>

    <canvas id="gameCanvas" width="600" height="200"></canvas>

    <div class="game-over" id="gameOver">
        <h1>GAME OVER</h1>
        <div id="finalScore">Score: 0</div>
        <button>Try Again</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
