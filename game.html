<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
    <title>Ocal Pulse | Neon Runner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        @import url('https://cdn.jsdelivr.net/fontsource/fonts/geist-sans@latest/latin-400-normal.css');
        @import url('https://cdn.jsdelivr.net/fontsource/fonts/geist-sans@latest/latin-700-normal.css');
        @import url('https://cdn.jsdelivr.net/fontsource/fonts/geist-mono@latest/latin-400-normal.css');
    </style>
    <style>
        :root {
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.25);
            --accent-dim: rgba(168, 85, 247, 0.15);
            --accent-border: rgba(168, 85, 247, 0.35);
            --bg: #09090b;
            --glass: #18181b;
            --glass-border: #27272a;
            --radius: 12px;
            --text-main: #f4f4f5;
            --text-muted: #71717a;
            --text-dim: #a1a1aa;
            --font-title: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-main: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Geist Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        .game-wrapper {
            position: relative;
            width: 800px;
            height: 400px;
            border-radius: var(--radius);
            background: #050507;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* HUD */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .score-pill {
            background: rgba(24, 24, 27, 0.85);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 100px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        #score-val {
            font-family: var(--font-title);
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        #best-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #best-val {
            font-family: var(--font-title);
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            opacity: 0.9;
        }

        .hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .key {
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            font-family: var(--font-mono);
        }

        /* Game Over Screen */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: var(--radius);
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            text-align: center;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 32px 48px;
            border-radius: var(--radius);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        h1 {
            font-family: var(--font-title);
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .accent-text {
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        #final-score {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 24px;
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 28px;
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px var(--accent-glow);
            filter: brightness(1.1);
        }

        .exit-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .exit-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            opacity: 0.8;
            transition: color 0.15s ease;
            pointer-events: auto;
        }

        .exit-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="exit-container">
            <a href="games.html" class="exit-link">EXIT TO HUB</a>
        </div>

        <div class="hud">
            <div class="score-pill">
                <span id="score-val">0</span>
            </div>
            <div class="score-pill">
                <span id="best-label">Best</span>
                <span id="best-val">0</span>
            </div>
        </div>

        <div class="hint">
            Press <span class="key">SPACE</span> or <span class="key">UP</span> to Pulse
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="modal-overlay" id="gameOverModal">
            <div class="modal">
                <h1>SYSTEM <span class="accent-text">HALTED</span></h1>
                <div id="final-score">Score: 0</div>
                <button class="btn" id="restartBtn">RESTART CORE</button>
            </div>
        </div>
    </div>

    <script>
        // Apply dynamic accent color
        function applyAccent(color) {
            if (!color) return;
            document.documentElement.style.setProperty('--accent', color);
            
            const hexToRgba = (hex, alpha) => {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                if (!result) return `rgba(168, 85, 247, ${alpha})`;
                const r = parseInt(result[1], 16);
                const g = parseInt(result[2], 16);
                const b = parseInt(result[3], 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            };
            
            document.documentElement.style.setProperty('--accent-glow', hexToRgba(color, 0.25));
            document.documentElement.style.setProperty('--accent-dim', hexToRgba(color, 0.15));
            document.documentElement.style.setProperty('--accent-border', hexToRgba(color, 0.35));
        }

        if (window.electronAPI) {
            window.electronAPI.getSettings().then(s => {
                if (s.accentColor) applyAccent(s.accentColor);
            });
            window.electronAPI.onSettingsChanged((s) => {
                if (s.accentColor) applyAccent(s.accentColor);
            });
        }
    </script>
    <script src="game.js"></script>
</body>
</html>
