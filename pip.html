<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Pop-out</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --bg-glass: rgba(10, 10, 14, 0.6);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-radius: 22px; /* Super rounded corners as per goal photo */
        }

        .pip-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 22px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-glass);
            -webkit-app-region: drag; /* Draggable by surface */
        }

        #pip-canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        #pip-thumbnail {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(20px) brightness(0.6);
            z-index: 1;
            opacity: 0.5;
        }

        /* ── Controls Layout ────────────────────────────────────────── */
        .controls-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.6) 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 50;
            backdrop-filter: blur(8px);
            -webkit-app-region: no-drag;
            padding: 24px;
            pointer-events: none;
        }

        .show-controls .controls-overlay {
            opacity: 1;
            backdrop-filter: blur(12px);
        }

        .controls-overlay > * { pointer-events: auto; }

        /* ── Top Bar (Floating) ────────────────────────────────────────── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .top-group {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
        }

        .btn:hover {
            background: rgba(168, 85, 247, 0.25);
            border-color: var(--accent);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .btn-circle { border-radius: 50%; }

        /* ── Center Controls ────────────────────────────────────────── */
        .center-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            gap: 24px;
            z-index: 60;
        }

        .play-btn {
            width: 64px;
            height: 64px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            font-size: 20px;
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .side-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.8;
            transition: 0.2s;
        }

        .side-btn:hover { opacity: 1; transform: scale(1.2); }

        /* ── Bottom Section ────────────────────────────────────────── */
        .bottom-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .accent-palette {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .accent-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .accent-dot:hover { transform: scale(1.4); border-color: white; }
        .accent-dot.active { transform: scale(1.2); border-color: white; box-shadow: 0 0 10px currentColor; }

        .time-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }

        .progress-container {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 100px;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* ── Loader ────────────────────────────────────────── */
        .loader-container {
            position: absolute;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            pointer-events: none;
        }

        .ora-loader {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(168, 85, 247, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <div class="pip-container" id="pip-container">
        <canvas id="pip-canvas"></canvas>
        <img id="pip-thumbnail" src="" />

        <div class="loader-container" id="pip-loader">
            <div class="ora-loader"></div>
        </div>

        <div class="controls-overlay" id="controls-overlay">
            <div class="top-bar">
                <div class="top-group">
                    <div class="btn" id="volume-icon-btn" title="Toggle Mute">
                        <i class="fas fa-volume-up" id="volume-icon"></i>
                    </div>
                    <div class="btn" id="pin-btn" title="Always on Top">
                        <i class="fas fa-thumbtack"></i>
                    </div>
                    <div class="btn" id="captions-btn" title="Toggle Captions">
                        <i class="fas fa-closed-captioning"></i>
                    </div>
                </div>

                <div class="top-group">
                    <div class="btn" id="return-btn" title="Return to Tab">
                        <i class="fas fa-external-link-alt"></i>
                    </div>
                    <div class="btn" id="close-btn" title="Close">
                        <i class="fas fa-times"></i>
                    </div>
                </div>
            </div>

            <div class="center-controls">
                <button class="side-btn" id="skip-back-btn" title="Back 10s">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="btn play-btn" id="play-pause-btn">
                    <i class="fas fa-play" id="play-icon"></i>
                </button>
                <button class="side-btn" id="next-btn" title="Next Video">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>

            <div class="bottom-section">
                <div class="accent-palette">
                    <div class="accent-dot active" style="color: #a855f7; background: #a855f7;" data-color="#a855f7"></div>
                    <div class="accent-dot" style="color: #3b82f6; background: #3b82f6;" data-color="#3b82f6"></div>
                    <div class="accent-dot" style="color: #10b981; background: #10b981;" data-color="#10b981"></div>
                    <div class="accent-dot" style="color: #f59e0b; background: #f59e0b;" data-color="#f59e0b"></div>
                    <div class="accent-dot" style="color: #ef4444; background: #ef4444;" data-color="#ef4444"></div>
                </div>
                
                <div class="time-row">
                    <span id="time-display">0:00 / 0:00</span>
                    <span id="speed-indicator" style="cursor: pointer;">1.0X</span>
                </div>

                <div class="progress-container" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="pip.js"></script>
</body>
</html>
