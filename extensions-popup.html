<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0c;
            --border: #252525;
            --accent: #09f0a0;
            --accent-glow: rgba(9, 240, 160, 0.2);
            --accent-dim: rgba(9, 240, 160, 0.12);
            --card-bg: #111111;
            --card-border: #252525;
            --card-hover-bg: #1e1e1e;
            --card-hover-border: var(--accent);
            --text: #e8e8e8;
            --text-dim: #666666;
            --font: 'Geist Mono', monospace;
            --title-font: 'Geist Mono', monospace;
        }

        /* ── Light Theme (Flashbang Mode) ─────────────────────────── */
        body[data-theme="light"] {
            --bg: #ffffff;
            --border: #e2e8f0;
            --accent: #058f60;
            --accent-glow: rgba(5, 143, 96, 0.2);
            --accent-dim: rgba(5, 143, 96, 0.12);
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --card-hover-bg: #f1f5f9;
            --card-hover-border: var(--accent);
            --text: #0f172a;
            --text-dim: #475569;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            border-radius: 12px;
        }

        body {
            background: transparent;
            margin: 0; padding: 15px;
            overflow: hidden;
            font-family: var(--font);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .popup-container {
            position: relative;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            padding-bottom: 24px;
            display: flex; flex-direction: column;
            gap: 16px;
            width: 320px;
            box-shadow: none !important;
        }

        .popup-container::before {
            display: none !important;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 16px; border-bottom: 1px solid var(--card-border);
            margin-bottom: 4px;
            border-radius: 0;
        }

        .header h3 {
            font-family: var(--title-font); font-size: 15px; font-weight: 700;
            color: var(--text);
            border-radius: 0;
        }

        .manage-link {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--accent); cursor: pointer;
            transition: opacity 0.2s;
            border-radius: 0;
        }
        .manage-link:hover { opacity: 0.8; }

        .list-section-label {
            font-size: 9px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-dim); margin: 4px 0 2px 4px;
            border-radius: 0;
        }

        .ext-list {
            max-height: 420px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 4px;
            scrollbar-width: none;
            border-radius: 0;
        }
        .ext-list::-webkit-scrollbar { display: none; }

        .ext-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; border-radius: 8px;
            background: var(--card-bg); border: 1px solid var(--card-border);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        .ext-item:hover {
            background: var(--card-hover-bg);
            border-color: var(--card-hover-border);
        }

        .ext-icon-wrapper {
            width: 32px; height: 32px; border-radius: 8px;
            background: var(--card-bg); border: 1px solid var(--card-border);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: var(--accent); flex-shrink: 0;
            box-shadow: none !important;
        }

        .ext-icon-img {
            width: 20px; height: 20px; border-radius: 4px;
        }

        .ext-info { flex: 1; min-width: 0; border-radius: 0; }
        .ext-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 1px; border-radius: 0; }
        .ext-desc { font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-radius: 0; }

        /* Toggles */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
            flex-shrink: 0;
            background: var(--card-border);
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 100px;
        }
        .toggle-switch::after {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 4px;
            top: 4px;
            background: var(--text);
            transition: 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 50%;
            box-shadow: none !important;
        }
        .toggle-switch.on {
            background: var(--accent) !important;
            border-radius: 100px !important;
            box-shadow: none !important;
        }
        .toggle-switch.on::after {
            transform: translateX(20px);
            background: var(--bg) !important;
            box-shadow: none !important;
        }

        .empty-state {
            text-align: center; padding: 40px 20px;
            color: var(--text-dim); font-size: 12px;
        }
        .empty-state i { font-size: 28px; margin-bottom: 12px; opacity: 0.5; color: var(--accent); display: block; }
    </style>
</head>
<body>
    <div class="popup-container">
        <div class="header">
            <h3>Extensions Hub</h3>
            <span class="manage-link" onclick="manageAll()">Settings <i class="fas fa-chevron-right"></i></span>
        </div>
        
        <div class="ext-list" id="extList">
            <!-- Items injected by JS -->
            <div class="empty-state">
                <i class="fas fa-circle-notch fa-spin"></i>
                Synchronizing security modules...
            </div>
        </div>
    </div>

    <script>
        function applyTheme(accent) {
            if (!accent) return;
            document.documentElement.style.setProperty('--accent', accent);
            const r = parseInt(accent.slice(1,3), 16), g = parseInt(accent.slice(3,5), 16), b = parseInt(accent.slice(5,7), 16);
            document.documentElement.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.2)`);
            document.documentElement.style.setProperty('--accent-dim', `rgba(${r}, ${g}, ${b}, 0.08)`);
        }

        async function loadAll() {
            const all = await window.electronAPI.invoke('get-all-extensions');
            const list = document.getElementById('extList');
            const settings = await window.electronAPI.invoke('get-settings');
            
            if (settings.accentColor) applyTheme(settings.accentColor);
            if (settings.themeMode) document.body.setAttribute('data-theme', settings.themeMode);


            list.innerHTML = '';

            
            const native = all.filter(e => e.type === 'native');
            const marketplace = all.filter(e => e.type === 'marketplace' && e.enabled);

            if (native.length > 0) {
                const label = document.createElement('div');
                label.className = 'list-section-label';
                label.innerText = 'Ocal Security Modules';
                list.appendChild(label);
                
                native.forEach(ext => list.appendChild(createItem(ext)));
            }

            if (marketplace.length > 0) {
                const label = document.createElement('div');
                label.className = 'list-section-label';
                label.innerText = 'Active Extensions';
                list.appendChild(label);
                
                marketplace.forEach(ext => list.appendChild(createItem(ext)));
            } else if (native.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-microchip"></i>
                        No modules active. Browse settings to enable features.
                    </div>`;
            }
        }

        function createItem(ext) {
            const item = document.createElement('div');
            item.className = 'ext-item';
            
            let iconHtml = '';
            if (ext.type === 'native') {
                iconHtml = `<div class="ext-icon-wrapper"><i class="fas ${ext.icon}"></i></div>`;
            } else {
                let iconUrl = `https://icons.duckduckgo.com/ip3/${ext.id}.ico`;
                if (ext.icons) {
                    const sizes = Object.keys(ext.icons).map(Number).sort((a,b) => a-b);
                    if (sizes.length > 0) iconUrl = `chrome-extension://${ext.id}/${ext.icons[sizes[sizes.length-1]]}`;
                }
                iconHtml = `<div class="ext-icon-wrapper"><img src="${iconUrl}" class="ext-icon-img" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>'"></div>`;
            }

            item.innerHTML = `
                ${iconHtml}
                <div class="ext-info">
                    <div class="ext-name">${ext.name}</div>
                    <div class="ext-desc">${ext.desc || 'Marketplace Extension'}</div>
                </div>
                ${ext.type === 'native' ? `<div class="toggle-switch ${ext.enabled ? 'on' : ''}"></div>` : ''}
            `;
            
            item.onclick = async () => {
                if (ext.type === 'native') {
                    const newState = !ext.enabled;
                    const success = await window.electronAPI.invoke('toggle-native-extension', { id: ext.id, enabled: newState });
                    if (success) loadAll();
                } else {
                    window.electronAPI.send('action-extension', ext.id);
                }
            };
            
            return item;
        }

        function manageAll() {
            window.electronAPI.send('open-extensions-page');
        }

        loadAll();
    </script>
</body>
</html>
