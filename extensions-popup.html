<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/fonts/geist-fonts.css">
    <style>
        @import url('./assets/fonts/geist-fonts.css');

        :root {
            --bg: rgba(12, 12, 12, 0.95);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #09f0a0;
            --accent-glow: rgba(9, 240, 160, 0.25);
            --accent-dim: rgba(9, 240, 160, 0.12);
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.04);
            --card-hover-bg: rgba(255, 255, 255, 0.04);
            --card-hover-border: var(--accent);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --radius: 12px;
            --font-main: 'Geist Mono', monospace;
            --font-title: 'Geist', sans-serif;
        }

        body[data-theme="light"] {
            --bg: rgba(255, 255, 255, 0.95);
            --border: rgba(0, 0, 0, 0.08);
            --card-bg: rgba(0, 0, 0, 0.02);
            --card-border: rgba(0, 0, 0, 0.04);
            --card-hover-bg: rgba(0, 0, 0, 0.03);
            --card-hover-border: var(--accent);
            --text-primary: #0f172a;
            --text-secondary: #475569;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            border-radius: var(--radius);
        }

        body {
            background: transparent;
            margin: 0; padding: 12px;
            overflow: hidden;
            font-family: var(--font-main);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        .popup-container {
            position: relative;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 14px;
            display: flex; 
            flex-direction: column;
            gap: 12px;
            width: 280px; /* Thinner, more compact layout width */
            box-shadow: none !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        body[data-theme="light"] .popup-container {
            box-shadow: none !important;
        }

        .popup-container::before {
            display: none !important;
        }

        .header {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding-bottom: 10px; 
            border-bottom: 1px solid var(--border);
            border-radius: 0;
        }

        .header h3 {
            font-family: var(--font-title); 
            font-size: 13px; 
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.2px;
            border-radius: 0;
        }

        .manage-link {
            font-size: 8px; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1.5px; 
            color: var(--text-secondary); 
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .manage-link:hover { color: var(--accent); }

        .list-section-label {
            font-size: 8px; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1.5px; 
            color: var(--text-secondary); 
            margin: 6px 0 2px 2px;
            opacity: 0.5;
            border-radius: 0;
        }

        .ext-list {
            max-height: 380px; 
            overflow-y: auto;
            display: flex; 
            flex-direction: column; 
            gap: 4px;
            scrollbar-width: none;
            border-radius: 0;
            padding-right: 2px;
        }
        .ext-list::-webkit-scrollbar { display: none; }

        .ext-item {
            display: flex; 
            align-items: center; 
            gap: 10px;
            padding: 8px 10px; 
            border-radius: 8px;
            background: var(--card-bg); 
            border: 1px solid var(--card-border);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        .ext-item:hover {
            background: var(--card-hover-bg);
            border-color: var(--card-hover-border);
        }

        .ext-icon-wrapper {
            width: 26px; 
            height: 26px; 
            border-radius: 6px;
            background: var(--card-bg); 
            border: 1px solid var(--card-border);
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 11px; 
            color: var(--accent); 
            flex-shrink: 0;
        }

        .ext-icon-img {
            width: 16px; height: 16px; border-radius: 4px;
        }

        .ext-info { 
            flex: 1; 
            min-width: 0; 
            border-radius: 0; 
        }
        
        .ext-name { 
            font-size: 11px; 
            font-weight: 600; 
            color: var(--text-primary); 
            margin-bottom: 1px; 
            border-radius: 0; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        
        .ext-desc { 
            font-size: 9px; 
            color: var(--text-secondary); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            border-radius: 0; 
            opacity: 0.7;
        }

        /* Thinner, sleeker Toggles */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 30px;
            height: 16px;
            flex-shrink: 0;
            background: var(--border);
            transition: 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 100px;
        }
        .toggle-switch::after {
            position: absolute;
            content: "";
            height: 10px;
            width: 10px;
            left: 3px;
            top: 3px;
            background: var(--text-primary);
            transition: 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 50%;
        }
        .toggle-switch.on {
            background: var(--accent) !important;
            border-radius: 100px !important;
        }
        .toggle-switch.on::after {
            transform: translateX(14px);
            background: var(--bg) !important;
        }

        .empty-state {
            text-align: center; 
            padding: 30px 10px;
            color: var(--text-secondary); 
            font-size: 10px;
        }
        .empty-state i { font-size: 22px; margin-bottom: 8px; opacity: 0.6; color: var(--accent); display: block; }
    </style>
</head>
<body>
    <div class="popup-container">
        <div class="header">
            <h3>Extensions Hub</h3>
            <span class="manage-link" onclick="manageAll()">Manage <i class="fas fa-arrow-right"></i></span>
        </div>
        
        <div class="ext-list" id="extList">
            <div class="empty-state">
                <i class="fas fa-circle-notch fa-spin"></i>
                Syncing modules...
            </div>
        </div>
    </div>

    <script>
        let lastColor = null;

        function getModeAccent(color, isLight) {
            if (!color) return isLight ? '#058f60' : '#09f0a0';
            if (!isLight) return color;
            const hex = color.toLowerCase();
            if (hex === '#09f0a0' || hex === '#00ffaa' || hex.includes('f0a0')) return '#058f60';
            if (hex === '#ff007f' || hex === '#ff00aa' || hex.includes('ff007') || hex.includes('ff00a')) return '#d81b60';
            if (hex === '#00e5ff' || hex === '#00ffff' || hex.includes('00e5') || hex.includes('00f0')) return '#0288d1';
            if (hex === '#ff9100' || hex === '#ffaa00' || hex.includes('ff91') || hex.includes('ffaa')) return '#d97706';
            if (hex === '#8b5cf6' || hex === '#a855f7' || hex === '#9333ea' || hex.includes('8b5c') || hex.includes('a855')) return '#6d28d9';
            if (hex === '#ff4d4d' || hex === '#ff3333' || hex.includes('ff4d') || hex.includes('ff33')) return '#dc2626';
            if (hex === '#ffffff' || hex === '#f4f4f5' || hex === '#e8e8e8' || hex.includes('fff')) return '#0f172a';
            return color;
        }

        function applyTheme(accent) {
            if (!accent) return;
            lastColor = accent;
            const isLight = document.body.getAttribute('data-theme') === 'light';
            const activeAccent = getModeAccent(accent, isLight);
            document.body.style.setProperty('--accent', activeAccent);
            const r = parseInt(activeAccent.slice(1,3), 16), g = parseInt(activeAccent.slice(3,5), 16), b = parseInt(activeAccent.slice(5,7), 16);
            document.body.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.25)`);
            document.body.style.setProperty('--accent-dim', `rgba(${r}, ${g}, ${b}, 0.12)`);
        }

        async function loadAll() {
            const all = await window.electronAPI.invoke('get-all-extensions');
            const list = document.getElementById('extList');
            const settings = await window.electronAPI.invoke('get-settings');
            
            if (settings.themeMode) document.body.setAttribute('data-theme', settings.themeMode);
            if (settings.accentColor) applyTheme(settings.accentColor);

            list.innerHTML = '';

            const native = all.filter(e => e.type === 'native');
            const marketplace = all.filter(e => e.type === 'marketplace' && e.enabled);

            if (native.length > 0) {
                const label = document.createElement('div');
                label.className = 'list-section-label';
                label.innerText = 'Ocal Security Modules';
                list.appendChild(label);
                
                native.forEach(ext => list.appendChild(createItem(ext)));
            }

            if (marketplace.length > 0) {
                const label = document.createElement('div');
                label.className = 'list-section-label';
                label.innerText = 'Active Extensions';
                list.appendChild(label);
                
                marketplace.forEach(ext => list.appendChild(createItem(ext)));
            } else if (native.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-microchip"></i>
                        No active security modules.
                    </div>`;
            }
        }

        function createItem(ext) {
            const item = document.createElement('div');
            item.className = 'ext-item';
            
            let iconHtml = '';
            if (ext.type === 'native') {
                iconHtml = `<div class="ext-icon-wrapper"><i class="fas ${ext.icon}"></i></div>`;
            } else {
                let iconUrl = `https://icons.duckduckgo.com/ip3/${ext.id}.ico`;
                if (ext.icons) {
                    const sizes = Object.keys(ext.icons).map(Number).sort((a,b) => a-b);
                    if (sizes.length > 0) iconUrl = `chrome-extension://${ext.id}/${ext.icons[sizes[sizes.length-1]]}`;
                }
                iconHtml = `<div class="ext-icon-wrapper"><img src="${iconUrl}" class="ext-icon-img" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>'"></div>`;
            }

            item.innerHTML = `
                ${iconHtml}
                <div class="ext-info">
                    <div class="ext-name">${ext.name}</div>
                    <div class="ext-desc">${ext.desc || 'Marketplace Extension'}</div>
                </div>
                ${ext.type === 'native' ? `<div class="toggle-switch ${ext.enabled ? 'on' : ''}"></div>` : ''}
            `;
            
            item.onclick = async () => {
                if (ext.type === 'native') {
                    const newState = !ext.enabled;
                    const success = await window.electronAPI.invoke('toggle-native-extension', { id: ext.id, enabled: newState });
                    if (success) loadAll();
                } else {
                    window.electronAPI.send('action-extension', ext.id);
                }
            };
            
            return item;
        }

        function manageAll() {
            window.electronAPI.send('open-extensions-page');
        }

        // Listener for dynamic settings update
        window.electronAPI.on('settings-changed', (e, s) => {
            if (s.themeMode) document.body.setAttribute('data-theme', s.themeMode);
            if (s.accentColor) applyTheme(s.accentColor);
        });

        loadAll();
    </script>
</body>
</html>
