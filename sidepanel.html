<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://suggestqueries.google.com https://api.github.com https://cdnjs.cloudflare.com https://unpkg.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: rgba(10, 10, 15, 0.7);
            --border: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --accent: #a855f7;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            backdrop-filter: blur(40px) saturate(180%);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
            box-shadow: -20px 0 60px rgba(0,0,0,0.4);
        }
        .header {
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            background: rgba(255,255,255,0.02);
            -webkit-app-region: drag;
        }
        .title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            font-weight: 600;
        }
        .controls {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }
        .btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.05);
            border: 1px solid transparent;
            color: #fff;
            opacity: 0.7;
        }
        .btn:hover {
            background: rgba(255,255,255,0.1);
            opacity: 1;
            transform: scale(1.05);
        }
        .close-btn:hover {
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
            border-color: rgba(255, 59, 48, 0.2);
        }
        .content-area { flex: 1; background: transparent; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="title" id="panel-title">System Blade</div>
        <div class="controls">
            <button class="btn" onclick="window.electronAPI.send('nav-back-panel')"><i class="fas fa-arrow-left" style="font-size:10px"></i></button>
            <button class="btn" onclick="window.electronAPI.send('nav-reload-panel')"><i class="fas fa-sync-alt" style="font-size:10px"></i></button>
            <button class="btn close-btn" onclick="window.electronAPI.send('hide-web-app')"><i class="fas fa-times"></i></button>
        </div>
    </div>
    <div class="content-area"></div>
    <script>
        window.electronAPI.on('update-panel-title', (e, t) => { document.getElementById('panel-title').textContent = t; });
    </script>
</body>
</html>
